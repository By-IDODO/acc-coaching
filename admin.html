emand on the front tires), and wait for grip to return. Then re-apply your steering input more gently.","**The practice drill.** Spend 15 minutes doing this: enter the same corner 10 times, each time with slightly more speed. Find the exact point where understeer begins. Then drive 10 more laps just below that point. You've now calibrated your brain to feel the front grip limit. This is enormously valuable — most drivers never do this deliberately and spend months guessing where the limit is.","**Why this matters for your development.** Once you can feel front grip limit, you can consistently carry the maximum entry speed without exceeding it. No more guessing, no more random understeer moments. You'll instinctively know 'I can carry 3 more km/h here' or 'I'm at the limit, hold this speed.' That instinct is what separates a 2:20 driver from a 2:18 driver at Spa."],"quiz":[{"question":"What is understeer?","options":["The rear slides out","The car turns more than expected","The front tires lose grip and the car pushes wide","The brakes lock up"],"correct":2},{"question":"Why should you practice inducing understeer intentionally?","options":["It's fun to slide","To learn exactly where the front grip limit is","To wear out the tires evenly","To practice recovery"],"correct":1},{"question":"How do you recover from understeer?","options":["Add more steering lock","Brake hard","Gently lift off throttle and straighten the wheel slightly","Floor the throttle"],"correct":2}]},{"id":"p-d-oversteer","title":"Feeling the Limit: Inducing Oversteer","desc":"Learn to make the rear step out intentionally — mastering the other half of the grip limit.","videoUrl":"","content":["If understeer is the front tires giving up, oversteer is the rear tires giving up. The back of the car swings outward, the car rotates more than you asked, and if uncorrected, you spin. Learning to create this intentionally — and catch it — is a fundamental skill that transforms your car control.","**What is oversteer exactly?** The rear tires exceed their grip limit. The back of the car slides outward. On ACC, you'll feel the rear get 'light,' the car suddenly rotates faster than expected, and the rear tires screech. Your instinct will scream 'SPIN!' — but with practice, you'll learn to manage it.","**How to induce oversteer safely.** Use a medium-speed corner. Method 1: **Lift-off oversteer** — enter the corner at moderate speed on partial throttle, then suddenly lift off the throttle completely mid-corner. Weight transfers sharply to the front, unloading the rear. The back steps out. Method 2: **Power oversteer** — on corner exit, apply throttle aggressively. The rear tires break traction and the back slides out.","**Three causes of oversteer.** First: **sudden throttle lift mid-corner** — weight transfer unloads the rear. Second: **too much throttle on exit** — rear tires can't put the power down. Third: **trail braking too deep** — too much brake pressure while turning overloads the rear's ability to maintain lateral grip. Each feels different and requires different corrections.","**How to correct oversteer.** Counter-steer: turn the wheel in the direction of the slide (if the rear goes right, steer right). Keep it smooth — violent corrections cause a snap back in the other direction. Modulate throttle: for power oversteer, reduce throttle gently. For lift-off oversteer, apply a small amount of throttle to shift weight rearward and re-grip the rear tires.","**The practice drill.** At a safe corner (a wide, medium-speed turn with runoff), practice each type of oversteer deliberately. Do 5 lift-off oversteer moments, catching each one. Then 5 power oversteer moments on exit. Focus on the FEELING — how the car moves under you, the sound of the rear tires, the visual cue of the horizon rotating faster than expected.","**Combining understeer and oversteer knowledge.** Now you understand both sides of the grip limit. The fastest driving happens in the narrow band between understeer and oversteer — what racing drivers call 'neutral steer' or 'the balance point.' Every setup change, every input adjustment, every driving technique is ultimately about staying in this narrow band as long as possible through every corner."],"quiz":[{"question":"What causes lift-off oversteer?","options":["Braking too late","Suddenly lifting off the throttle mid-corner, transferring weight forward","Turning too slowly","Cold rear tires only"],"correct":1},{"question":"How do you correct oversteer?","options":["Brake hard","Counter-steer in the direction of the slide + modulate throttle","Add more steering into the corner","Do nothing and wait"],"correct":1},{"question":"The fastest driving happens in what zone?","options":["Full understeer","Full oversteer","The narrow band between understeer and oversteer (neutral steer)","Maximum straight-line speed"],"correct":2}]}]},{"target":"Pure Driving > Intermediate","chapters":[{"id":"p-i-gripcircle","title":"The Grip Circle: Combining Forces","desc":"Master the friction circle — the key to using 100% of available grip at all times.","videoUrl":"","content":["You now know that longitudinal forces (braking/acceleration) and lateral forces (cornering) share the same grip budget. The grip circle — also called the friction circle or traction circle — is the visual representation of this concept, and understanding it is what turns a good driver into a great one.","**Visualizing the grip circle.** Imagine a circle where the horizontal axis represents lateral grip (turning) and the vertical axis represents longitudinal grip (braking at the top, acceleration at the bottom). The edge of the circle represents 100% of available grip. Any point inside the circle means you're not using all available grip. Any point outside means you've exceeded the limit — and you're sliding.","**The goal: stay on the edge.** A perfect lap means the tires are operating at the edge of the grip circle through every meter of the track. On a straight, you're at the top of the circle (100% braking) or the bottom (100% acceleration). In a pure cornering phase, you're at the left or right edge (100% lateral). The transitions between these — trail braking, corner exit — are the diagonal paths along the circle's edge.","**Trail braking through the grip circle lens.** When you begin braking, you're at the top of the circle (100% longitudinal). As you approach the corner and start turning, you need to release brake pressure proportionally. You're moving along the edge of the circle from '100% braking, 0% turning' to '0% braking, 100% turning.' If you keep full brake pressure while turning, you go outside the circle — lockup or understeer.","**Corner exit through the grip circle.** Same principle in reverse. At the apex, you're at '100% turning, 0% acceleration.' As you unwind the steering on exit, you can progressively add throttle. You're moving along the circle from '100% lateral' back to '100% longitudinal (acceleration).' Add too much throttle too early while still turning hard = outside the circle = wheelspin or oversteer.","**Why this matters more than any technique.** Every advanced technique — trail braking, throttle steer, brake bias adjustment — is just a specific strategy for staying on the edge of the grip circle. If you understand the circle, you understand WHY techniques work, not just HOW to do them. When someone tells you 'release the brake as you add steering,' you now know it's because you need to stay on the edge of the circle — reducing one force to make room for the other.","**Practice: the smooth transition drill.** Pick any corner. Focus on making the transition from braking to cornering as smooth as possible. No jerky brake release, no sudden steering input. Imagine tracing the edge of the circle with your inputs. Smooth means you're staying on the edge. Jerky means you're jumping inside (wasting grip) or outside (exceeding grip)."],"quiz":[{"question":"What does the edge of the grip circle represent?","options":["The car's top speed","100% of available tire grip being used","The point where tires overheat","Maximum engine power"],"correct":1},{"question":"During trail braking, you move along the grip circle from:","options":["100% turning to 100% braking","100% braking to 100% turning","100% acceleration to 100% braking","Inside the circle to outside"],"correct":1},{"question":"Why must you release brake pressure as you add steering?","options":["To save the brakes","Because ABS requires it","To stay on the edge of the grip circle — reducing one force to make room for the other","It's just a preference"],"correct":2}]},{"id":"p-i-corners1","title":"Corner Precision: Reading Corner Geometry","desc":"Learn to decode any corner before you even drive it — the systematic approach.","videoUrl":"","content":["Fast drivers don't guess their way through corners. They read the geometry of each corner and build a plan before turning in. This systematic approach means you can get up to speed on a new track in minutes rather than hours.","**The three phases of any corner.** Every corner, no matter how complex, breaks down into three phases: **entry** (braking zone to turn-in), **mid-corner** (turn-in to apex), and **exit** (apex to track-out). Each phase has a specific priority. Entry: set the correct speed. Mid-corner: achieve the right rotation. Exit: maximize acceleration.","**Reading corner radius.** The radius tells you how much speed you can carry. Look at the inside edge of the corner — how tight is the curve? A large radius (gentle curve) = high speed. A small radius (tight curve) = low speed. On ACC, use your first practice laps to visually assess each corner's radius before pushing.","**Identifying the apex type.** Not all apexes are in the geometric center of the corner. A **geometric apex** is the midpoint — used when there's no significant straight after the corner. A **late apex** clips inside past the midpoint — used when a long straight follows, prioritizing exit speed. An **early apex** clips inside before the midpoint — rare, used when the next corner requires a specific positioning.","**The exit dictates everything.** Here's the key insight: always plan your corner from the exit backward. Ask: what comes after this corner? If a long straight follows, you need a late apex for maximum exit speed — even if it means a slower entry. If another corner follows immediately, your exit needs to position you correctly for the next entry. The exit requirement determines the apex, which determines the entry.","**Corner camber and elevation.** ACC models track surfaces realistically. A **positive camber** corner (banked inward) gives you more grip — you can carry more speed. A **negative camber** (off-camber) corner takes away grip — reduce speed more than you'd expect. Elevation changes affect weight transfer: downhill braking zones need earlier braking, uphill entries give you extra grip.","**Building your corner plan.** For each corner, ask these four questions in order: 1) What comes after? (determines apex type) 2) How tight is it? (determines speed) 3) Any camber or elevation? (adjusts grip expectations) 4) Where are my reference points? (braking board, turn-in marker, apex kerb). This 4-question method works for any corner on any track."],"quiz":[{"question":"When planning a corner, what should you consider first?","options":["Entry speed","Braking point","What comes after the corner (the exit)","The apex kerb"],"correct":2},{"question":"When should you use a late apex?","options":["Always","When a long straight follows the corner","When the corner is very fast","Only in the rain"],"correct":1},{"question":"An off-camber corner means:","options":["More grip than expected","Less grip than expected — reduce speed","The track is flat","Only the outside has grip"],"correct":1}]},{"id":"p-i-corners2","title":"Corner Precision: Compound & Blind Corners","desc":"Decode the most challenging corner types that catch out even experienced drivers.","videoUrl":"","content":["Not every corner is a simple single-radius turn. ACC's tracks are full of compound corners, double apexes, and blind entries that require specific techniques. Understanding these corner types prevents the costly mistakes that ruin laps and races.","**Compound corners (tightening radius).** A corner that gets tighter as you go through it — like Turn 1-2 at Barcelona or parts of the Nürburgring. The danger: you enter at a speed appropriate for the initial radius, but the corner tightens and suddenly you're too fast. The solution: treat the tightest part as your reference point. Set your entry speed for the TIGHTEST section, not the entry. You'll feel slow at first but be perfectly positioned for the rest.","**Opening radius corners.** The opposite — a corner that opens up as you go. These are gifts: you can trail brake deep into the initial tight part, then progressively unwind steering and add throttle as the radius opens. These corners reward confidence on the exit. Pouhon at Spa is a beautiful example.","**Double apex corners.** Two distinct tightening points in what looks like one long corner. The key: treat them as two separate corners linked by a mini-straight. Clip the first apex gently (don't over-commit), let the car drift mid-corner, then tighten for the second apex. The second apex is usually more important because it leads to the exit.","**Blind corners and crests.** Corners where you can't see the apex or exit on approach — Eau Rouge at Spa, parts of Bathurst. These are pure commitment corners. You MUST learn them through repetition. On your first laps, go slowly and build a mental map. Note reference points on the approach: a specific barrier, a patch of grass, a marshal post. After 5-10 laps, you'll have the visual memory to commit at speed.","**Chicanes.** Two opposite-direction corners in quick succession. The key is smoothness and rhythm — think of the chicane as one flowing movement, not two separate turns. Straighten the car as much as possible between the two direction changes to minimize scrubbing speed. At Monza's first chicane, drivers who 'flow' through it are 0.3-0.5s faster than those who treat it as two violent direction changes.","**The deceptive corner.** Some corners look like one radius from the approach but actually change mid-corner. The track might have a visual illusion — the kerbing suggests one line but the actual fastest line is different. The only defense: practice laps and studying onboard videos. Never trust your first visual impression of a corner you haven't driven before."],"quiz":[{"question":"For a tightening radius corner, what speed should you set on entry?","options":["Speed for the widest part","Speed for the tightest section of the corner","Maximum possible speed","Whatever feels right"],"correct":1},{"question":"In a double apex corner, which apex is usually more important?","options":["The first one","The second one, because it leads to the exit","Both equally","Neither — the mid-corner matters more"],"correct":1},{"question":"The best approach to chicanes is:","options":["Two violent direction changes","One smooth flowing movement, straightening between turns","Flat out through both","Brake for each turn separately"],"correct":1}]},{"id":"p-i-coldtires","title":"Cold Tires: The First Lap Challenge","desc":"Master the critical first laps when grip is at its lowest — where races are won and lost.","videoUrl":"","content":["The first 2-3 laps of any stint are the most dangerous in racing. Tires are cold, brakes are cold, and grip is significantly reduced. On ACC, cold tire performance is modeled with extreme realism. Learning to manage this phase is a direct competitive advantage — most drivers either overdrive and crash or drive far too cautiously and lose positions.","**How much grip do you lose?** Cold GT3 tires on ACC have roughly 15-25% less grip than fully warmed tires. That's enormous. Your normal braking point at 100m? You now need to brake at 120-130m. Your normal entry speed of 140 km/h? Drop it to 125-130. If you use your warm-tire references on cold tires, you WILL go off.","**Tire warm-up physics.** Tires generate heat through three mechanisms: **friction with the track surface** (driving generates heat), **flexing of the rubber compound** (cornering loads flex the sidewall), and **slip** (controlled sliding generates heat through the contact patch). Of these, controlled cornering load is the most efficient way to bring heat into the tires.","**The warm-up strategy.** Lap 1: drive at 80% pace. Focus on smooth, progressive inputs. Weave gently on straights (helps front tires), brake progressively and early (warms fronts and rears). Use the full track width in corners to load the tires laterally. Lap 2: increase to 90%. Braking points move 5-10m later. Entry speeds increase slightly. Lap 3: full pace should be possible if you've warmed correctly.","**Brake warm-up matters too.** Cold brake discs have much lower friction coefficient. ACC models this. First braking zone: brake 15-20m earlier and more gently. Aggressive braking on cold brakes leads to lockups because the ABS system calibrates for warm brake performance. By the end of lap 1, brakes should be in their operating window.","**Race start tire management.** During the formation lap (or warm-up laps in practice), use every opportunity: brake hard then release several times on the straight, swerve gently, take corners with purpose. In a race, the drivers who manage cold tires best often gain 2-3 positions in the first lap simply because others make cold-tire mistakes.","**The cold-tire practice drill.** In practice, instead of building up slowly over many laps, deliberately go out on cold tires and practice your cold-tire technique: earlier braking, gentler inputs, progressive build-up. Do this 5 times in a session — each time you go out on track should start with 2-3 cold-tire management laps. This builds the habit that will save you in races."],"quiz":[{"question":"How much less grip do cold tires have compared to warm ones?","options":["5%","15-25%","50%","No difference on ACC"],"correct":1},{"question":"Most efficient way to warm up tires?","options":["Burnouts and wheelspin","Controlled cornering load that flexes the rubber","Driving only on straights","Waiting for them to warm on their own"],"correct":1},{"question":"On cold tires, your braking point should be:","options":["The same as warm tires","15-25 meters earlier than normal","10 meters later to warm them faster","Only use engine braking"],"correct":1}]}]},{"target":"Pure Driving > Expert","chapters":[{"id":"p-e-brakebias","title":"Advanced Balance: Brake Bias & Engine Braking","desc":"Fine-tune your car's deceleration balance for every corner and condition.","videoUrl":"","content":["At the expert level, you're no longer just braking — you're sculpting the car's behavior through how and where the deceleration force is applied. Brake bias and engine braking are two powerful tools that most console drivers never touch, but they can transform your cornering ability.","**What is brake bias?** Brake bias determines how braking force is distributed between front and rear axles. On ACC GT3 cars, you can adjust this mid-race via the MFD. A forward bias (e.g., 58% front) puts more braking force on the front tires. A rearward bias (e.g., 54% front) shifts more to the rear. The default is usually around 56-58% front.","**How brake bias affects handling.** More front bias: the car is more stable under braking but harder to rotate into the corner. It resists turning — you get entry understeer. More rear bias: the car rotates more easily under braking (the rear gets light), but can become unstable. Too much rear bias = the rear locks or snaps during trail braking.","**When to adjust bias.** Move bias FORWARD (1-2 clicks) when: you're experiencing rear instability under braking, the track is wet, or you're on worn rear tires. Move bias REARWARD (1-2 clicks) when: you need more rotation into slow corners, the car feels too stable and won't turn, or you're confident in your trail braking.","**Engine braking — the hidden tool.** When you lift off the throttle, the engine creates a braking force on the rear wheels only. ACC lets you adjust engine brake maps. Higher engine braking = more rear deceleration on throttle lift = more rotation on corner entry. Lower engine braking = smoother, more stable entry but less natural rotation.","**Combining brake bias and engine braking.** These two tools together define your deceleration balance. If you run low engine braking and forward brake bias, the car will be very stable but difficult to rotate — you'll need aggressive trail braking to turn. If you run high engine braking and rearward brake bias, the car practically pivots into corners but can be a handful to control.","**Finding your personal balance.** Start with defaults (57% front bias, medium engine braking). If entry understeer is your issue, try 1 click rearward on bias or 1 step up on engine braking — never both at once. If the rear is snapping, go 1 click forward on bias. Make ONE change at a time, do 3-4 laps, evaluate. This systematic approach prevents the 'I changed everything and now nothing works' spiral."],"quiz":[{"question":"More forward brake bias results in:","options":["More rotation on entry","More stability under braking but less rotation","Faster straight-line speed","Better traction on exit"],"correct":1},{"question":"Engine braking primarily affects which wheels?","options":["Front wheels only","All four wheels","Rear wheels only","It depends on the car"],"correct":2},{"question":"When making brake bias adjustments, you should:","options":["Change multiple settings at once","Change ONE setting at a time, evaluate over 3-4 laps","Only change in qualifying","Never change mid-race"],"correct":1}]},{"id":"p-e-3tools","title":"The Three Tools for Rotation","desc":"Combine steering, trail braking, and engine braking for precise corner entry.","videoUrl":"","content":["At the highest level, getting the car to rotate into a corner isn't about one technique — it's about combining three tools simultaneously. Mastering this combination is what allows you to carry maximum speed while still achieving the rotation you need.","**Tool 1: Steering.** The most obvious tool. Turning the wheel creates lateral force through the front contact patches. But steering alone has a limit — turn too much and you exceed the front tires' grip, causing understeer. The key insight: steering should be the LAST tool you rely on for rotation, not the first. Use the minimum steering angle needed and let the other tools help.","**Tool 2: Trail braking.** By maintaining brake pressure into the corner, you keep weight on the front tires (increasing their grip and ability to steer) while simultaneously reducing rear grip (the rear gets lighter). This weight distribution naturally rotates the car. The deeper you trail brake, the more the car rotates. Release the brake, and rotation stabilizes.","**Tool 3: Engine braking.** When you lift off the throttle, engine braking decelerates the rear wheels. This is essentially a rear-only brake that creates a yaw moment — the rear wants to come around. Combined with trail braking, you have two sources of rear-axis deceleration helping rotate the car.","**The combination in practice.** Approaching a corner: you're on full brakes (Tool 2 — loading the front, rotating the car). You turn in (Tool 1 — steering). You've already lifted off the throttle (Tool 3 — engine braking helps rotation). As you progress through the corner, you progressively release the brake (reducing Tool 2) and rely more on steering (Tool 1). At the apex, you begin adding throttle (canceling Tool 3) and unwinding steering (reducing Tool 1).","**Why this matters: reducing steering angle.** When you effectively use trail braking and engine braking for rotation, you need LESS steering angle. Less steering angle means the front tires aren't working as hard laterally, which means more grip is available for other forces. The car flows through the corner rather than being forced around it. This is the difference between driving a car and truly guiding it.","**The practice method.** Pick a familiar corner. First, drive it using only steering (no trail braking, coast into the corner). Notice how much lock you need. Then drive it with trail braking added — you'll need less steering. Then optimize your engine braking setting and drive it again — even less steering needed. The version with all three tools combined will feel smoother, faster, and more controlled. That's the sweet spot."],"quiz":[{"question":"The three tools for rotation are:","options":["Speed, brakes, and tires","Steering, trail braking, and engine braking","ABS, TC, and stability control","Camber, toe, and caster"],"correct":1},{"question":"When you use trail braking and engine braking effectively, what happens to your required steering angle?","options":["It increases","It stays the same","It decreases — you need less steering lock","It depends on the car"],"correct":2},{"question":"Why is less steering angle better?","options":["Looks cooler","Saves arm strength","Front tires work less hard, leaving more grip available","It doesn't matter"],"correct":2}]},{"id":"p-e-tiresurface","title":"Tire Surface Management: Heat Cycles & Degradation","desc":"Understand how tires degrade and how your driving style affects their life.","videoUrl":"","content":["ACC models tire physics at a level of detail that rewards deep understanding. Beyond just temperatures and pressures, the tire surface condition — grain, blistering, and wear — directly affects grip. Managing this over a race stint is what separates consistent podium finishers from mid-pack faders.","**Tire surface vs tire core temperature.** The surface temperature is what you feel immediately — it changes rapidly with driving intensity. The core temperature is the heat stored deep in the rubber — it changes slowly and represents the tire's 'base' operating state. Ideal: surface is 5-15°C hotter than core. If surface is much hotter than core (aggressive driving, not enough laps), you're overdriving the surface while the core is still cold. If core is too hot, the tire is fundamentally overheated and will degrade rapidly.","**Graining.** When the surface is too cold relative to the core, or when you ask too much of a cold tire, small pieces of rubber tear off the surface and roll around on the contact patch. This creates a layer of debris between the tire and the track — reducing grip significantly. You'll feel the car sliding more than expected, especially on corner entry. Solution: gentle driving for 1-2 laps to let surface temperature rebuild, or push through it (the rolled rubber eventually clears).","**Blistering.** The opposite problem — the surface overheats. Bubbles form under the surface rubber, creating raised spots that reduce contact area. Caused by: aggressive driving on high fuel loads, running pressures too low (tire flexes too much, generating excess internal heat), or too-soft compound in hot conditions. Once blisters form, they don't go away. Prevention is key: manage pressures and avoid overdiving early in stints.","**Flat-spotting.** Locking a wheel creates a flat spot — a section of the tire worn flat by sliding against the track. On ACC, flat spots create vibration and reduce grip. ABS helps prevent this, but aggressive braking on cold tires or during trail braking can still cause it. Small flat spots round off over a few laps. Large ones can ruin a stint.","**How driving style affects tire life.** Smooth inputs = long tire life. Every slide, every lockup, every wheelspin event scrubs rubber off the surface. A smooth driver's tires at lap 20 might have the grip that an aggressive driver's tires had at lap 12. Over a full race, this difference is massive — often 0.5-1.0s per lap in the final stint.","**The tire management strategy for races.** First 3 laps: build heat gradually, protect the surface. Laps 4-10: tires are in their peak window, push confidently. Laps 11-20: manage degradation — be slightly gentler on entries, avoid unnecessary slides. Final laps: tires are worn, adapt braking points earlier by 5-10m, reduce entry speeds slightly. Drivers who follow this curve consistently finish higher than those who push 100% from start to finish."],"quiz":[{"question":"What is graining?","options":["Tires getting too hot","Small rubber pieces tearing off a cold surface, reducing grip","Normal tire wear","A type of compound"],"correct":1},{"question":"How does smooth driving affect tire life?","options":["No effect","Makes tires degrade faster","Significantly extends tire life — every slide scrubs rubber away","Only affects front tires"],"correct":2},{"question":"Best tire management strategy for a race stint?","options":["Push 100% every lap","Build heat gradually, push in the middle, manage degradation late","Save tires for the last 3 laps only","Ignore tires and focus on position"],"correct":1}]}]}];
const cloneDeep=(value)=>JSON.parse(JSON.stringify(value));
const mergeCoursesWithNewLessons=(baseCourses)=>{
  const courses=cloneDeep(Array.isArray(baseCourses)?baseCourses:DEFAULT_COURSES);
  (NEW_LESSON_BATCHES||[]).forEach(batch=>{
    const [courseTitle,levelName]=(batch.target||"").split(">").map(part=>part.trim());
    if(!courseTitle||!levelName)return;
    const course=courses.find(item=>item.title===courseTitle);
    const level=course?.levels?.find(item=>item.level===levelName);
    if(!level)return;
    const existingIds=new Set((level.chapters||[]).map(ch=>ch.id));
    (batch.chapters||[]).forEach(chapter=>{
      if(!existingIds.has(chapter.id)){
        level.chapters.push(chapter);
        existingIds.add(chapter.id);
      }
    });
  });
  return courses;
};

const loadData = () => {
  try { const d = localStorage.getItem(DATA_KEY); return d ? mergeCoursesWithNewLessons(JSON.parse(d)) : null; } catch { return null; }
};
const saveData = (data) => {
  try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); return true; } catch { return false; }
};
// Supabase content sync
const sbLoadContent=async(key)=>{try{const{data,error}=await sb.from("app_content").select("data").eq("key",key).maybeSingle();if(error)console.warn("Load error:",error);return data?.data||null}catch(e){console.warn("Load catch:",e);return null}};
const sbSaveContent=async(key,val)=>{try{const{error}=await sb.from("app_content").upsert({key,data:val,updated_at:new Date().toISOString()});if(error){console.error("Save error:",error);return false}return true}catch(e){console.error("Save catch:",e);return false}};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ─── TOAST ────────────────────────────────────────────────────
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className={`toast toast-${type}`}>{type === "success" ? "✓" : "✗"} {message}</div>;
}

// ─── APP ──────────────────────────────────────────────────────
function AdminApp() {
  const [authUser, setAuthUser] = useState(undefined);
  const [courses, setCourses] = useState(() => loadData() || mergeCoursesWithNewLessons(DEFAULT_COURSES));
  const [selected, setSelected] = useState({ type:"dashboard" });
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [hasChanges, setHasChanges] = useState(false);
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginErr, setLoginErr] = useState("");

  const showToast = (message, type="success") => setToast({ message, type, key: Date.now() });

  const [isSaving, setIsSaving] = useState(false);

  const loadAdminContent = useCallback(async () => {
    try {
      const remoteCourses = await sbLoadContent("courses");
      if (remoteCourses) { const mergedCourses=mergeCoursesWithNewLessons(remoteCourses); setCourses(mergedCourses); saveData(mergedCourses); }
      const remoteSettings = await sbLoadContent("settings");
      if (remoteSettings) { localStorage.setItem("acc-coaching-settings", JSON.stringify(remoteSettings)); }
    } catch (e) {
      console.warn("Admin content load failed:", e);
    }
  }, []);

  const save = useCallback(async () => {
    if (isSaving) return;
    setIsSaving(true);
    saveData(courses);
    try {
      const { data: { user }, error: userError } = await sb.auth.getUser();
      if (userError || !user || user.email !== ADMIN_EMAIL) {
        showToast("Session admin invalide — reconnectez-vous", "error");
        return;
      }
      const r1 = await sbSaveContent("courses", courses);
      const settings = JSON.parse(localStorage.getItem("acc-coaching-settings") || "{}");
      const r2 = await sbSaveContent("settings", settings);
      if (r1 && r2) {
        setHasChanges(false);
        showToast("Sauvegardé et synchronisé !");
      } else {
        showToast("Sauvegardé en local, mais synchro cloud échouée", "error");
      }
    } catch(e) {
      console.error("Save error:", e);
      showToast("Sauvegardé en local, mais erreur cloud", "error");
    } finally {
      setIsSaving(false);
    }
  }, [courses, isSaving]);

  // Load latest from Supabase on admin login
  useEffect(() => {
    sb.auth.getSession().then(({data:{session}})=>{setAuthUser(session?.user||null)});
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      setAuthUser(session?.user || null);
      if (session?.user && (event === "INITIAL_SESSION" || event === "SIGNED_IN" || event === "TOKEN_REFRESHED")) {
        setTimeout(() => { loadAdminContent(); }, 0);
      }
    });
    return () => subscription.unsubscribe();
  }, [loadAdminContent]);

  const updateCourses = (fn) => {
    setCourses(prev => { const next = JSON.parse(JSON.stringify(prev)); fn(next); return next; });
    setHasChanges(true);
  };

  const nav = (sel) => { setSelected(sel); setSidebarOpen(false); };

  // Count helpers
  const totalChapters = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.length, 0), 0);
  const totalQuiz = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.reduce((s3,ch) => s3 + ch.quiz.length, 0), 0), 0);

  function doLogin(){
    setLoginErr("");
    sb.auth.signInWithPassword({email:loginEmail,password:loginPass}).then(({error})=>{if(error)setLoginErr(error.message)});
  }

  // Auth gate: must be logged in with admin email
  if (authUser === undefined) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#101114",color:"#e4e4e7",fontFamily:"'DM Sans',sans-serif"}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⚙️</div><div>Chargement...</div></div></div>;
  if (authUser === null || authUser.email !== ADMIN_EMAIL) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#101114",color:"#e4e4e7",fontFamily:"'DM Sans',sans-serif",padding:20}}>
      <div style={{maxWidth:380,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:40,marginBottom:8}}>🔒</div><div style={{fontSize:20,fontWeight:700}}>Admin Panel</div><div style={{fontSize:12,color:"#9294a0",marginTop:4}}>Connexion requise — accès réservé à l'administrateur</div></div>
        <div style={{background:"#16171c",border:"1px solid #2a2b33",borderRadius:12,padding:24}}>
          {loginErr && <div style={{color:"#ef4444",fontSize:12,marginBottom:12,padding:"8px 12px",background:"#ef444415",borderRadius:6}}>{loginErr}</div>}
          {authUser && authUser.email !== ADMIN_EMAIL && <div style={{color:"#f59e0b",fontSize:12,marginBottom:12,padding:"8px 12px",background:"#f59e0b15",borderRadius:6}}>⚠️ {authUser.email} n'est pas autorisé. <button style={{background:"none",border:"none",color:"#e11d48",cursor:"pointer",fontWeight:700}} onClick={()=>sb.auth.signOut()}>Se déconnecter</button></div>}
          <input style={{width:"100%",padding:"10px 14px",background:"#101114",border:"1px solid #2a2b33",borderRadius:8,color:"#e4e4e7",fontSize:14,marginBottom:10}} type="email" placeholder="Email admin" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}/>
          <input style={{width:"100%",padding:"10px 14px",background:"#101114",border:"1px solid #2a2b33",borderRadius:8,color:"#e4e4e7",fontSize:14,marginBottom:12}} type="password" placeholder="Mot de passe" value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={doLogin}>Se connecter</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="admin-layout">
      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen ? "open" : ""}`}>
        <div className="sidebar-header">
          <div className="sidebar-logo"><span>⚙️</span><span>ACC Admin</span></div>
          <div className="sidebar-sub">Gestion du contenu</div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Navigation</div>
            <button className={`nav-item ${selected.type==="dashboard"?"active":""}`} onClick={()=>nav({type:"dashboard"})}>
              <span className="nav-icon">📊</span> Dashboard
            </button>
            <button className={`nav-item ${selected.type==="users"?"active":""}`} onClick={()=>nav({type:"users"})}>
              <span className="nav-icon">👥</span> Utilisateurs
            </button>
            <button className={`nav-item ${selected.type==="coaching"?"active":""}`} onClick={()=>nav({type:"coaching"})}>
              <span className="nav-icon">🎯</span> Page Coaching
            </button>
            <button className={`nav-item ${selected.type==="homeLayout"?"active":""}`} onClick={()=>nav({type:"homeLayout"})}>
              <span className="nav-icon">🏠</span> Layout Accueil
            </button>
          </div>
          {courses.map((course, ci) => (
            <div key={course.id} className="nav-section">
              <div className="nav-section-title">{course.icon} {course.title}</div>
              <button className={`nav-item ${selected.type==="course"&&selected.ci===ci?"active":""}`} onClick={()=>nav({type:"course",ci})}>
                <span className="nav-icon">📝</span> Infos du parcours
              </button>
              {course.levels.map((level, li) => (
                <div key={li}>
                  {level.chapters.map((ch, chi) => (
                    <button key={ch.id} className={`nav-item ${selected.type==="chapter"&&selected.ci===ci&&selected.li===li&&selected.chi===chi?"active":""}`}
                      onClick={()=>nav({type:"chapter",ci,li,chi})}>
                      <span className="nav-icon"><span className="color-dot" style={{background:level.color,display:"inline-block"}}/></span>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch.title}</span>
                    </button>
                  ))}
                  <button className="nav-item" style={{color:"var(--accent)",fontSize:12}} onClick={() => {
                    updateCourses(d => {
                      d[ci].levels[li].chapters.push({ id:uid(), title:"Nouveau chapitre", desc:"Description...", videoUrl:"", content:["Contenu de la leçon..."], quiz:[] });
                    });
                    const newChi = course.levels[li].chapters.length; // will be length after push
                    setTimeout(() => nav({type:"chapter",ci,li,chi:newChi}), 50);
                  }}>
                    <span className="nav-icon">+</span> Ajouter chapitre
                  </button>
                </div>
              ))}
            </div>
          ))}
          <div className="nav-section">
            <button className="nav-item" style={{color:"var(--accent)"}} onClick={() => {
              updateCourses(d => {
                d.push({ id:uid(), title:"Nouveau parcours", icon:"📚", desc:"Description du parcours", levels:[{level:"Débutant",color:"#22c55e",chapters:[]}] });
              });
            }}>
              <span className="nav-icon">+</span> Nouveau parcours
            </button>
          </div>
        </div>
        <div className="sidebar-footer">
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",opacity:isSaving?0.7:1,cursor:isSaving?"wait":"pointer"}} onClick={save} disabled={isSaving}>
            {isSaving ? "⏳ Sauvegarde..." : `💾 ${hasChanges ? "Enregistrer *" : "Enregistrer"}`}
          </button>
          <button className="btn btn-secondary" style={{width:"100%",justifyContent:"center"}} onClick={() => {
            const json = JSON.stringify(courses, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = "acc-coaching-data.json"; a.click();
            URL.revokeObjectURL(url);
            showToast("Export téléchargé !");
          }}>
            📥 Exporter JSON
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="main-header">
          <div>
            <div className="main-title">
              {selected.type === "dashboard" && "Dashboard"}
              {selected.type === "users" && "Utilisateurs"}
              {selected.type === "coaching" && "Page Coaching"}
              {selected.type === "homeLayout" && "Layout Accueil"}
              {selected.type === "course" && courses[selected.ci]?.title}
              {selected.type === "chapter" && courses[selected.ci]?.levels[selected.li]?.chapters[selected.chi]?.title}
            </div>
            <div className="main-subtitle">
              {selected.type === "dashboard" && `${courses.length} parcours · ${totalChapters} chapitres · ${totalQuiz} questions`}
              {selected.type === "users" && "Gestion des comptes et accès premium"}
              {selected.type === "coaching" && "Modifier les textes de la page coaching"}
              {selected.type === "homeLayout" && "Réordonner les blocs de la page d'accueil et les parcours"}
              {selected.type === "course" && "Paramètres du parcours"}
              {selected.type === "chapter" && `${courses[selected.ci]?.title} › ${courses[selected.ci]?.levels[selected.li]?.level}`}
            </div>
          </div>
          <div className="main-actions">
            {hasChanges && <span style={{fontSize:12,color:"var(--yellow)"}}>● Non sauvé</span>}
            <button className="btn btn-primary" onClick={save} disabled={isSaving} style={{opacity:isSaving?0.7:1,cursor:isSaving?"wait":"pointer"}}>{isSaving?"⏳ Sauvegarde...":"💾 Sauvegarder"}</button>
          </div>
        </div>
        <div className="main-content">
          {selected.type === "dashboard" && <DashboardView courses={courses} nav={nav} updateCourses={updateCourses} showToast={showToast}/>}
          {selected.type === "users" && <UsersView showToast={showToast} courses={courses}/>}
          {selected.type === "coaching" && <CoachingEditor showToast={showToast}/>}
          {selected.type === "homeLayout" && <HomeLayoutEditor courses={courses} updateCourses={updateCourses} showToast={showToast}/>}
          {selected.type === "course" && <CourseEditor courses={courses} ci={selected.ci} updateCourses={updateCourses} nav={nav} showToast={showToast}/>}
          {selected.type === "chapter" && <ChapterEditor courses={courses} ci={selected.ci} li={selected.li} chi={selected.chi} updateCourses={updateCourses} showToast={showToast}/>}
        </div>
      </div>

      <button className="mobile-menu-btn" onClick={() => setSidebarOpen(!sidebarOpen)}>☰</button>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────
function DashboardView({ courses, nav, updateCourses, showToast }) {
  const fileRef = useRef();
  const totalCh = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.length, 0), 0);
  const totalQ = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.reduce((s3,ch) => s3 + ch.quiz.length, 0), 0), 0);

  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data) && data[0]?.levels) {
          updateCourses(() => {}); // trigger change
          localStorage.setItem("acc-coaching-courses", JSON.stringify(data));
          window.location.reload();
        } else { showToast("Format JSON invalide", "error"); }
      } catch { showToast("Erreur de lecture JSON", "error"); }
    };
    reader.readAsText(file);
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--accent)"}}>{courses.length}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>PARCOURS</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--blue)"}}>{totalCh}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>CHAPITRES</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--green)"}}>{totalQ}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>QUESTIONS QUIZ</div></div></div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">📚 Parcours</div>
          <button className="btn btn-sm btn-primary" onClick={() => {
            updateCourses(d => d.push({id:uid(),title:"Nouveau parcours",icon:"📚",desc:"Description",levels:[{level:"Débutant",color:"#22c55e",chapters:[]}]}));
          }}>+ Ajouter</button>
        </div>
        <div className="card-body">
          {courses.map((c, ci) => (
            <div key={c.id} className="list-item">
              <span style={{fontSize:24}}>{c.icon}</span>
              <div className="item-info">
                <div className="item-title">{c.title}</div>
                <div className="item-sub">{c.levels.reduce((s,l)=>s+l.chapters.length,0)} chapitres · {c.levels.length} niveaux</div>
              </div>
              <div className="item-actions">
                <button className="btn-icon" onClick={()=>nav({type:"course",ci})} title="Modifier">✏️</button>
                <button className="btn-icon" onClick={()=>{if(confirm("Supprimer ce parcours ?"))updateCourses(d=>d.splice(ci,1))}} title="Supprimer">🗑️</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="card-header"><div className="card-title">🔧 Outils</div></div>
        <div className="card-body" style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-secondary" onClick={() => fileRef.current?.click()}>📤 Importer JSON</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
          <button className="btn btn-secondary" onClick={() => {
            const json = JSON.stringify(courses, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download="acc-coaching-data.json"; a.click();
          }}>📥 Exporter JSON</button>
          <button className="btn btn-danger" onClick={() => {
            if (confirm("⚠️ Réinitialiser TOUT le contenu aux valeurs par défaut ? Cette action est irréversible.")) {
              localStorage.removeItem(DATA_KEY);
              localStorage.removeItem(PROGRESS_KEY);
              window.location.reload();
            }
          }}>🔄 Réinitialiser tout</button>
        </div>
      </div>
    </div>
  );
}

// ─── COURSE EDITOR ────────────────────────────────────────────
function CourseEditor({ courses, ci, updateCourses, nav, showToast }) {
  const course = courses[ci];
  if (!course) return <div className="empty-state"><div className="empty-icon">❌</div><div className="empty-text">Parcours introuvable</div></div>;

  const ICONS = ["🏎️","⚔️","🔧","🏁","🎯","⚡","🛞","🌧️","🏆","📚","💡","🎮"];
  const COLORS = ["#22c55e","#f59e0b","#ef4444","#3b82f6","#8b5cf6","#ec4899","#06b6d4","#f97316"];

  return (
    <div>
      <div className="card">
        <div className="card-header"><div className="card-title">Informations du parcours</div></div>
        <div className="card-body">
          <div className="form-group">
            <label className="form-label">Icône</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ICONS.map(ic => (
                <button key={ic} style={{fontSize:24,width:40,height:40,borderRadius:8,border:course.icon===ic?"2px solid var(--accent)":"1px solid var(--border)",background:course.icon===ic?"var(--accent)15":"var(--bg)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>updateCourses(d=>{d[ci].icon=ic})}>{ic}</button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Titre du parcours</label>
            <input className="form-input" value={course.title} onChange={e=>updateCourses(d=>{d[ci].title=e.target.value})} placeholder="Ex: Pilotage Pur"/>
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={course.desc} onChange={e=>updateCourses(d=>{d[ci].desc=e.target.value})} placeholder="Description courte du parcours"/>
          </div>
        </div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="card-header">
          <div className="card-title">📊 Niveaux ({course.levels.length})</div>
          <button className="btn btn-sm btn-primary" onClick={()=>updateCourses(d=>{d[ci].levels.push({level:"Nouveau niveau",color:"#3b82f6",chapters:[]})})}>+ Ajouter niveau</button>
        </div>
        <div className="card-body">
          {course.levels.map((level, li) => (
            <div key={li} className="list-item" style={{borderLeft:`3px solid ${level.color}`}}>
              <div className="item-info">
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input className="form-input" style={{padding:"4px 8px",width:180,fontSize:13}} value={level.level} onChange={e=>updateCourses(d=>{d[ci].levels[li].level=e.target.value})}/>
                  <div style={{display:"flex",gap:3}}>
                    {COLORS.map(col => (
                      <button key={col} style={{width:18,height:18,borderRadius:"50%",background:col,border:level.color===col?"2px solid #fff":"1px solid #333",cursor:"pointer"}}
                        onClick={()=>updateCourses(d=>{d[ci].levels[li].color=col})}/>
                    ))}
                  </div>
                </div>
                <div className="item-sub">{level.chapters.length} chapitres</div>
              </div>
              <div className="item-actions">
                {li > 0 && <button className="btn-icon" title="Monter" onClick={()=>updateCourses(d=>{const t=d[ci].levels[li];d[ci].levels[li]=d[ci].levels[li-1];d[ci].levels[li-1]=t})}>↑</button>}
                {li < course.levels.length-1 && <button className="btn-icon" title="Descendre" onClick={()=>updateCourses(d=>{const t=d[ci].levels[li];d[ci].levels[li]=d[ci].levels[li+1];d[ci].levels[li+1]=t})}>↓</button>}
                <button className="btn-icon" title="Supprimer" onClick={()=>{if(confirm("Supprimer ce niveau et tous ses chapitres ?"))updateCourses(d=>{d[ci].levels.splice(li,1)})}}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:20}}>
        <button className="btn btn-danger" onClick={()=>{if(confirm("Supprimer le parcours \""+course.title+"\" ?")) { updateCourses(d=>d.splice(ci,1)); nav({type:"dashboard"}); }}}>🗑️ Supprimer ce parcours</button>
      </div>
    </div>
  );
}

// ─── CHAPTER EDITOR ───────────────────────────────────────────
function ChapterEditor({ courses, ci, li, chi, updateCourses, showToast }) {
  const [tab, setTab] = useState("info");
  const chapter = courses[ci]?.levels[li]?.chapters[chi];
  if (!chapter) return <div className="empty-state"><div className="empty-icon">❌</div><div className="empty-text">Chapitre introuvable</div></div>;

  const update = (fn) => updateCourses(d => fn(d[ci].levels[li].chapters[chi]));

  return (
    <div>
      <div className="status-bar">
        ✓ Chapitre : {chapter.content.filter(b => typeof b === "string" || (typeof b === "object" && b.type !== "image")).length} textes · {chapter.content.filter(b => typeof b === "object" && b.type === "image").length} images · {chapter.quiz.length} questions quiz · Vidéo : {chapter.videoUrl ? "✓" : "✗"}
      </div>

      <div className="tabs">
        <button className={`tab ${tab==="info"?"active":""}`} onClick={()=>setTab("info")}>ℹ️ Infos</button>
        <button className={`tab ${tab==="content"?"active":""}`} onClick={()=>setTab("content")}>📖 Contenu</button>
        <button className={`tab ${tab==="video"?"active":""}`} onClick={()=>setTab("video")}>🎬 Vidéo</button>
        <button className={`tab ${tab==="quiz"?"active":""}`} onClick={()=>setTab("quiz")}>✅ Quiz ({chapter.quiz.length})</button>
        <button className={`tab ${tab==="danger"?"active":""}`} onClick={()=>setTab("danger")}>⚠️</button>
      </div>

      {/* INFO TAB */}
      {tab === "info" && (
        <div className="card">
          <div className="card-body">
            <div className="form-group">
              <label className="form-label">Titre du chapitre</label>
              <input className="form-input" value={chapter.title} onChange={e=>update(ch=>{ch.title=e.target.value})} placeholder="Ex: Les bases du freinage"/>
            </div>
            <div className="form-group">
              <label className="form-label">Description courte</label>
              <input className="form-input" value={chapter.desc} onChange={e=>update(ch=>{ch.desc=e.target.value})} placeholder="Ex: Apprends à freiner efficacement"/>
            </div>
            <div className="form-group">
              <label className="form-label">Identifiant unique</label>
              <input className="form-input" value={chapter.id} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--text3)"}} readOnly/>
            </div>
          </div>
        </div>
      )}

      {/* CONTENT TAB */}
      {tab === "content" && (
        <div>
          <div className="para-hint">💡 **texte** = gras rouge. Types : Texte (3 tailles), Titre, Encadré, Image. Réordonne librement.</div>
          {chapter.content.map((block, pi) => {
            const bType = typeof block === "object" ? (block.type || "text") : "text";
            const isImage = bType === "image";
            const isHeading = bType === "heading";
            const isCallout = bType === "callout";
            const isText = !isImage && !isHeading && !isCallout;
            const textVal = typeof block === "string" ? block : (block.value || "");
            const size = typeof block === "object" ? (block.size || "normal") : "normal";
            const typeLabels = {text:"📝 Texte",heading:"🔤 Titre",callout:"💡 Encadré",image:"🖼️ Image"};
            const typeColors = {text:"var(--text3)",heading:"var(--accent)",callout:"var(--yellow)",image:"var(--blue)"};
            return (
            <div key={pi} className="para-block">
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{pi+1}</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:typeColors[bType]+"22",color:typeColors[bType]}}>{typeLabels[bType]||bType}</span>
                {isText && <select style={{fontSize:10,padding:"2px 6px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text2)"}} value={size} onChange={e=>update(ch=>{ch.content[pi]=typeof ch.content[pi]==="string"?{type:"text",value:ch.content[pi],size:e.target.value}:{...ch.content[pi],size:e.target.value}})}>
                  <option value="small">Petit</option><option value="normal">Normal</option><option value="large">Grand</option>
                </select>}
                <div style={{flex:1}}/>
                {pi > 0 && <button className="btn-icon btn-sm" title="Monter" onClick={()=>update(ch=>{const t=ch.content[pi];ch.content[pi]=ch.content[pi-1];ch.content[pi-1]=t})}>↑</button>}
                {pi < chapter.content.length-1 && <button className="btn-icon btn-sm" title="Descendre" onClick={()=>update(ch=>{const t=ch.content[pi];ch.content[pi]=ch.content[pi+1];ch.content[pi+1]=t})}>↓</button>}
                <button className="btn-icon btn-sm" style={{color:"var(--red)"}} title="Supprimer" onClick={()=>update(ch=>{ch.content.splice(pi,1)})}>✗</button>
              </div>
              {isImage ? (
                <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:12}}>
                  <div className="form-group" style={{marginBottom:8}}>
                    <label className="form-label">URL de l'image</label>
                    <input className="form-input" value={block.url||""} onChange={e=>update(ch=>{ch.content[pi]={...ch.content[pi],url:e.target.value}})} placeholder="https://example.com/image.jpg"/>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label className="form-label">Légende (optionnel)</label>
                    <input className="form-input" value={block.caption||""} onChange={e=>update(ch=>{ch.content[pi]={...ch.content[pi],caption:e.target.value}})} placeholder="Description de l'image..."/>
                  </div>
                  {block.url && <div style={{marginTop:8,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><img src={block.url} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}} alt={block.caption||""}/></div>}
                </div>
              ) : isHeading ? (
                <input className="form-input" style={{fontSize:18,fontWeight:700}} value={textVal} onChange={e=>update(ch=>{ch.content[pi]={type:"heading",value:e.target.value}})} placeholder="Titre de section..."/>
              ) : (
                <textarea className="form-input" style={{fontSize:isCallout?13:size==="large"?16:size==="small"?12:14}} value={textVal} rows={3} onChange={e=>update(ch=>{
                  if(typeof ch.content[pi]==="string"){ch.content[pi]=isCallout?{type:"callout",value:e.target.value}:e.target.value}
                  else{ch.content[pi]={...ch.content[pi],value:e.target.value}}
                })} placeholder={isCallout?"Texte de l'encadré...":"Contenu du paragraphe..."}/>
              )}
            </div>
          )})}
          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <button className="btn btn-secondary" onClick={()=>update(ch=>{ch.content.push("")})}>📝 Texte</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--accent)30",color:"var(--accent)"}} onClick={()=>update(ch=>{ch.content.push({type:"heading",value:""})})}>🔤 Titre</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--yellow)30",color:"var(--yellow)"}} onClick={()=>update(ch=>{ch.content.push({type:"callout",value:""})})}>💡 Encadré</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--blue)30",color:"var(--blue)"}} onClick={()=>update(ch=>{ch.content.push({type:"image",url:"",caption:""})})}>🖼️ Image</button>
          </div>
        </div>
      )}

      {/* VIDEO TAB */}
      {tab === "video" && (
        <div className="card">
          <div className="card-body">
            <div className="form-group">
              <label className="form-label">URL de la vidéo YouTube (embed)</label>
              <input className="form-input" value={chapter.videoUrl} onChange={e=>update(ch=>{ch.videoUrl=e.target.value})} placeholder="https://www.youtube.com/embed/XXXXXX"/>
              <div className="para-hint" style={{marginTop:8}}>
                Pour obtenir le lien embed : va sur YouTube → Partager → Intégrer → copie le lien src="https://www.youtube.com/embed/..."
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Source / Crédit vidéo (optionnel)</label>
              <input className="form-input" value={chapter.videoSource||""} onChange={e=>update(ch=>{ch.videoSource=e.target.value||undefined})} placeholder="Ex: Aris.Drives YouTube Channel"/>
              <div className="para-hint" style={{marginTop:4}}>Affiché en petit sous la vidéo dans l'app</div>
            </div>
            {chapter.videoUrl && (
              <div style={{marginTop:12}}>
                <label className="form-label">Aperçu</label>
                <div style={{borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                  <iframe src={chapter.videoUrl} style={{width:"100%",aspectRatio:"16/9",border:"none"}} allowFullScreen/>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* QUIZ TAB */}
      {tab === "quiz" && (
        <div>
          {chapter.quiz.length === 0 && (
            <div className="empty-state">
              <div className="empty-icon">✅</div>
              <div className="empty-text">Aucune question</div>
              <div className="empty-sub">Ajoute des questions pour valider ce chapitre</div>
            </div>
          )}
          {chapter.quiz.map((q, qi) => (
            <div key={qi} className="card" style={{marginBottom:12}}>
              <div className="card-header">
                <div className="card-title">
                  <span style={{color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Q{qi+1}</span>
                  Question {qi+1}
                </div>
                <div style={{display:"flex",gap:4}}>
                  {qi > 0 && <button className="btn-icon btn-sm" onClick={()=>update(ch=>{const t=ch.quiz[qi];ch.quiz[qi]=ch.quiz[qi-1];ch.quiz[qi-1]=t})}>↑</button>}
                  {qi < chapter.quiz.length-1 && <button className="btn-icon btn-sm" onClick={()=>update(ch=>{const t=ch.quiz[qi];ch.quiz[qi]=ch.quiz[qi+1];ch.quiz[qi+1]=t})}>↓</button>}
                  <button className="btn-icon btn-sm" style={{color:"var(--red)"}} onClick={()=>update(ch=>{ch.quiz.splice(qi,1)})}>🗑️</button>
                </div>
              </div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Question</label>
                  <input className="form-input" value={q.question} onChange={e=>update(ch=>{ch.quiz[qi].question=e.target.value})} placeholder="Pose ta question ici..."/>
                </div>
                <div className="form-group">
                  <label className="form-label">🖼️ Image de la question (optionnel)</label>
                  <input className="form-input" value={q.image||""} onChange={e=>update(ch=>{ch.quiz[qi].image=e.target.value||undefined})} placeholder="https://example.com/image.jpg"/>
                  {q.image && <div style={{marginTop:6,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><img src={q.image} style={{width:"100%",maxHeight:150,objectFit:"cover",display:"block"}} alt=""/></div>}
                </div>
                <div className="form-group">
                  <label className="form-label">🎬 Vidéo de la question (optionnel)</label>
                  <input className="form-input" value={q.video||""} onChange={e=>update(ch=>{ch.quiz[qi].video=e.target.value||undefined})} placeholder="https://www.youtube.com/embed/XXXXXX"/>
                  <div className="para-hint" style={{marginTop:4}}>Lien embed YouTube uniquement. Ex: https://www.youtube.com/embed/abc123</div>
                  {q.video && <div style={{marginTop:6,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><iframe src={q.video} style={{width:"100%",aspectRatio:"16/9",border:"none"}} allowFullScreen/></div>}
                </div>
                <label className="form-label">Options (clique le cercle vert pour marquer la bonne réponse)</label>
                {q.options.map((opt, oi) => (
                  <div key={oi} className="quiz-option-row">
                    <span style={{fontSize:11,color:"var(--text3)",width:16,textAlign:"center",fontWeight:600}}>{String.fromCharCode(65+oi)}</span>
                    <input className="form-input" style={{marginBottom:0}} value={opt} onChange={e=>update(ch=>{ch.quiz[qi].options[oi]=e.target.value})} placeholder={`Option ${String.fromCharCode(65+oi)}`}/>
                    <button className={`quiz-option-correct ${q.correct===oi?"is-correct":""}`} onClick={()=>update(ch=>{ch.quiz[qi].correct=oi})} title="Bonne réponse">✓</button>
                    {q.options.length > 2 && <button className="btn-icon btn-sm" style={{color:"var(--red)"}} onClick={()=>update(ch=>{ch.quiz[qi].options.splice(oi,1);if(ch.quiz[qi].correct>=oi&&ch.quiz[qi].correct>0)ch.quiz[qi].correct--})}>✗</button>}
                  </div>
                ))}
                {q.options.length < 6 && (
                  <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>update(ch=>{ch.quiz[qi].options.push("")})}>+ Ajouter option</button>
                )}
              </div>
            </div>
          ))}
          <button className="btn btn-primary" style={{marginTop:8}} onClick={()=>update(ch=>{ch.quiz.push({question:"",options:["","","",""],correct:0})})}>+ Ajouter une question</button>
        </div>
      )}

      {/* DANGER TAB */}
      {tab === "danger" && (
        <div className="card">
          <div className="card-header"><div className="card-title" style={{color:"var(--red)"}}>⚠️ Zone de danger</div></div>
          <div className="card-body">
            <p style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>Ces actions sont irréversibles. Fais attention !</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-danger" onClick={() => {
                if (confirm("Supprimer le chapitre \""+chapter.title+"\" ?\nCette action est irréversible.")) {
                  updateCourses(d => { d[ci].levels[li].chapters.splice(chi, 1); });
                  showToast("Chapitre supprimé");
                }
              }}>🗑️ Supprimer ce chapitre</button>
              <button className="btn btn-secondary" onClick={() => {
                updateCourses(d => {
                  const copy = JSON.parse(JSON.stringify(chapter));
                  copy.id = uid();
                  copy.title = copy.title + " (copie)";
                  d[ci].levels[li].chapters.splice(chi+1, 0, copy);
                });
                showToast("Chapitre dupliqué !");
              }}>📋 Dupliquer ce chapitre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── USERS VIEW ───────────────────────────────────────────────

function UsersView({ showToast, courses }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openUserId, setOpenUserId] = useState(null);
  const [trackFilters, setTrackFilters] = useState({});
  const [metricFilters, setMetricFilters] = useState({});

  const chapterIndex = React.useMemo(() => {
    const map = {};
    (courses || []).forEach(course => {
      (course.levels || []).forEach(level => {
        (level.chapters || []).forEach(chapter => {
          map[chapter.id] = {
            id: chapter.id,
            title: chapter.title,
            courseTitle: course.title,
            courseIcon: course.icon,
            level: level.level,
            levelColor: level.color,
            quizCount: (chapter.quiz || []).length,
          };
        });
      });
    });
    return map;
  }, [courses]);

  const totalChapters = Object.keys(chapterIndex).length;

  const loadUsers = React.useCallback(async () => {
    setLoading(true);
    try {
      const [{ data: profiles }, { data: progressRows }, { data: sessionLogRows }, { data: activityRows }] = await Promise.all([
        sb.from("profiles").select("id, display_name, email, premium, created_at, last_active"),
        sb.from("progress").select("id, data, updated_at"),
        sb.from("session_logs").select("id, user_id, session_date, track, car, best_lap, average_lap, starting_position, finishing_position, crash_count, focus, main_mistake, notes, created_at, updated_at").order("session_date", { ascending: false }).order("created_at", { ascending: false }),
        sb.from("user_activity").select("user_id, last_active"),
      ]);

      const progressMap = new Map((progressRows || []).map(row => [row.id, row]));
      const activityMap = new Map((activityRows || []).map(row => [row.user_id, row.last_active]));
      const sessionLogMap = new Map();
      (sessionLogRows || []).forEach(row => {
        const arr = sessionLogMap.get(row.user_id) || [];
        arr.push(row);
        sessionLogMap.set(row.user_id, arr);
      });

      const combined = (profiles || []).map(profile => {
        const progressRow = progressMap.get(profile.id);
        const progressData = progressRow?.data || {};
        const entries = Object.entries(progressData).map(([chapterId, status]) => ({
          chapterId,
          ...(status || {}),
          meta: chapterIndex[chapterId] || null,
        }));

        const validatedLessons = entries.filter(entry => entry.completed).sort((a, b) => (b.bestScore ?? b.quizScore ?? -1) - (a.bestScore ?? a.quizScore ?? -1));
        const attemptedLessons = entries.filter(entry => !entry.completed && (entry.bestScore != null || entry.quizScore != null)).sort((a, b) => (b.bestScore ?? b.quizScore ?? -1) - (a.bestScore ?? a.quizScore ?? -1));
        const avgScore = validatedLessons.length ? Math.round(validatedLessons.reduce((sum, entry) => sum + (entry.bestScore ?? entry.quizScore ?? 0), 0) / validatedLessons.length) : null;
        const sessionLogs = (sessionLogMap.get(profile.id) || []).slice().sort((a, b) => new Date(`${b.session_date || '1970-01-01'}T12:00:00`).getTime() - new Date(`${a.session_date || '1970-01-01'}T12:00:00`).getTime());

        return {
          ...profile,
          last_active: activityMap.get(profile.id) || profile.last_active || null,
          progressUpdatedAt: progressRow?.updated_at || null,
          validatedLessons,
          attemptedLessons,
          sessionLogs,
          sessionCount: sessionLogs.length,
          validatedCount: validatedLessons.length,
          attemptedCount: attemptedLessons.length,
          avgScore,
          progressPercent: totalChapters ? Math.round((validatedLessons.length / totalChapters) * 100) : 0,
        };
      }).sort((a, b) => new Date(b.last_active || b.progressUpdatedAt || 0).getTime() - new Date(a.last_active || a.progressUpdatedAt || 0).getTime());

      setUsers(combined);
      setTrackFilters(prev => {
        const next = { ...prev };
        combined.forEach(user => {
          if (!next[user.id]) next[user.id] = user.sessionLogs.find(log => log.track && ACC_TRACKS.includes(log.track))?.track || "";
        });
        return next;
      });
      setMetricFilters(prev => {
        const next = { ...prev };
        combined.forEach(user => {
          if (!next[user.id]) next[user.id] = 'lap_time';
        });
        return next;
      });
    } catch (e) {
      console.error("Users load error:", e);
      showToast("Impossible de charger les utilisateurs", "error");
    } finally {
      setLoading(false);
    }
  }, [chapterIndex, totalChapters, showToast]);

  useEffect(() => { loadUsers(); }, [loadUsers]);

  const togglePremium = async (uid, current) => {
    const { error } = await sb.from("profiles").update({ premium: !current }).eq("id", uid);
    if (error) {
      console.error("Premium update error:", error);
      showToast("Erreur lors de la mise à jour du premium", "error");
      return;
    }
    setUsers(prev => prev.map(u => u.id === uid ? { ...u, premium: !current } : u));
    showToast(!current ? "Premium activé !" : "Premium retiré");
  };

  const premiumCount = users.filter(u => u.premium).length;
  const activeLearners = users.filter(u => u.validatedCount > 0 || u.attemptedCount > 0 || u.sessionCount > 0).length;
  const totalValidated = users.reduce((sum, u) => sum + u.validatedCount, 0);
  const totalSessionSheets = users.reduce((sum, u) => sum + (u.sessionCount || 0), 0);

  if (loading) return <div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>Chargement des utilisateurs...</div>;

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--accent)"}}>{users.length}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>UTILISATEURS</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--yellow)"}}>{premiumCount}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>PREMIUM</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--green)"}}>{activeLearners}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>UTILISATEURS ACTIFS</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--blue)"}}>{totalValidated}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>LEÇONS VALIDÉES</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"#a855f7"}}>{totalSessionSheets}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>FICHES SESSION</div></div></div>
      </div>

      <div className="card">
        <div className="card-header" style={{gap:12,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap"}}>
          <div>
            <div className="card-title">👥 Tous les utilisateurs</div>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>Chaque profil permet maintenant de lire les fiches de session privées et d'afficher une courbe d'évolution des chronos, circuit par circuit.</div>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={loadUsers}>↻ Rafraîchir</button>
        </div>
        <div className="card-body">
          {users.length === 0 ? <div style={{textAlign:"center",color:"var(--text3)",padding:20}}>Aucun utilisateur inscrit</div> : users.map(u => {
            const isOpen = openUserId === u.id;
            const selectedTrack = trackFilters[u.id] || u.sessionLogs.find(log => log.track && ACC_TRACKS.includes(log.track))?.track || "";
            const trackOptions = ACC_TRACKS.filter(track => u.sessionLogs.some(log => log.track === track));
            const filteredLogs = selectedTrack ? u.sessionLogs.filter(log => log.track === selectedTrack) : [];
            const selectedMetric = metricFilters[u.id] || 'lap_time';
            const metricMeta = getAdminDevelopmentMetricMeta(selectedMetric);
            const chartPoints = selectedTrack ? buildTrackMetricSeries(u.sessionLogs, selectedTrack, selectedMetric) : [];
            const lapPoints = selectedTrack ? buildTrackMetricSeries(u.sessionLogs, selectedTrack, 'lap_time') : [];
            const bestSeconds = lapPoints.length ? Math.min(...lapPoints.map(point => point.value)) : null;
            const latestTrackLog = filteredLogs[0] || null;
            const bestFinish = filteredLogs.filter(log => parseInt(log.finishing_position, 10) > 0).reduce((best, log) => {
              const pos = parseInt(log.finishing_position, 10);
              return best == null ? pos : Math.min(best, pos);
            }, null);
            const totalCrashes = filteredLogs.reduce((sum, log) => sum + Math.max(0, parseInt(log.crash_count, 10) || 0), 0);
            return (
              <div key={u.id} style={{border:"1px solid var(--border)",borderRadius:12,marginBottom:12,overflow:"hidden",background:"var(--surface)"}}>
                <div style={{display:"flex",gap:12,alignItems:"center",padding:16,flexWrap:"wrap"}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:u.premium?"var(--yellow)22":"var(--surface3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{u.premium?"👑":"👤"}</div>
                  <div style={{flex:1,minWidth:220}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <div style={{fontWeight:700,fontSize:14}}>{u.display_name || "Sans nom"}</div>
                      {u.premium && <span style={{fontSize:10,fontWeight:700,padding:"4px 8px",borderRadius:999,background:"var(--yellow)22",color:"var(--yellow)",border:"1px solid var(--yellow)44"}}>PREMIUM</span>}
                    </div>
                    <div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{u.email}</div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>Inscrit le {u.created_at ? new Date(u.created_at).toLocaleDateString("fr-FR") : "—"}{u.last_active ? ` · Dernière activité ${new Date(u.last_active).toLocaleDateString("fr-FR")} ${new Date(u.last_active).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}` : ""}{u.progressUpdatedAt ? ` · Progress sync ${new Date(u.progressUpdatedAt).toLocaleDateString("fr-FR")} ${new Date(u.progressUpdatedAt).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}` : ""}</div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginLeft:"auto"}}>
                    <div style={{padding:"8px 10px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",minWidth:118,textAlign:"center"}}><div style={{fontSize:12,fontWeight:800,color:"var(--text1)"}}>{u.last_active ? new Date(u.last_active).toLocaleDateString("fr-FR") : "—"}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>LAST ACTIVE</div></div>
