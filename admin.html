                    <div style={{padding:"8px 10px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",minWidth:88,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"var(--accent)"}}>{u.validatedCount}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>VALIDÉES</div></div>
                    <div style={{padding:"8px 10px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",minWidth:88,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"var(--green)"}}>{u.avgScore != null ? `${u.avgScore}%` : "—"}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>MOYENNE</div></div>
                    <div style={{padding:"8px 10px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",minWidth:88,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"var(--blue)"}}>{u.progressPercent}%</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>PROGRESSION</div></div>
                    <div style={{padding:"8px 10px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)",minWidth:88,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#a855f7"}}>{u.sessionCount || 0}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>FICHES</div></div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className={`btn btn-sm ${u.premium?"btn-danger":"btn-primary"}`} onClick={() => togglePremium(u.id, u.premium)} style={{fontSize:11}}>{u.premium ? "Retirer Premium" : "👑 Premium"}</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => setOpenUserId(isOpen ? null : u.id)}>{isOpen ? "Masquer le détail" : "Voir le détail"}</button>
                  </div>
                </div>
                {isOpen && <div style={{padding:"0 16px 16px",borderTop:"1px solid var(--border)",background:"var(--bg)"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16,paddingTop:16}}>
                    <div style={{border:"1px solid var(--border)",borderRadius:12,background:"var(--surface)",overflow:"hidden"}}>
                      <div style={{padding:"12px 14px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:13}}>✅ Leçons validées ({u.validatedCount})</div>
                      <div style={{padding:12,maxHeight:340,overflowY:"auto"}}>{u.validatedLessons.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>Aucune leçon validée pour l'instant.</div> : u.validatedLessons.map((entry, index) => <div key={`${entry.chapterId}-${index}`} style={{padding:12,border:"1px solid var(--border)",borderRadius:10,background:"var(--bg)",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}><div><div style={{fontWeight:700,fontSize:13}}>{entry.meta?.title || entry.chapterId}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{entry.meta ? `${entry.meta.courseIcon} ${entry.meta.courseTitle} · ${entry.meta.level}` : "Leçon supprimée ou renommée"}</div></div><div style={{fontSize:12,fontWeight:700,color:"var(--green)",whiteSpace:"nowrap"}}>{Math.round(entry.bestScore ?? entry.quizScore ?? 0)}%</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}><span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"var(--green)22",color:"var(--green)",border:"1px solid var(--green)44"}}>Quiz validé</span>{entry.meta?.quizCount != null && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"var(--surface3)",color:"var(--text2)",border:"1px solid var(--border)"}}>{entry.meta.quizCount} question{entry.meta.quizCount > 1 ? "s" : ""}</span>}</div></div>)}</div>
                    </div>
                    <div style={{border:"1px solid var(--border)",borderRadius:12,background:"var(--surface)",overflow:"hidden"}}>
                      <div style={{padding:"12px 14px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:13}}>🟡 Quiz tentés non validés ({u.attemptedCount})</div>
                      <div style={{padding:12,maxHeight:340,overflowY:"auto"}}>{u.attemptedLessons.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>Aucune tentative non validée.</div> : u.attemptedLessons.map((entry, index) => <div key={`${entry.chapterId}-${index}`} style={{padding:12,border:"1px solid var(--border)",borderRadius:10,background:"var(--bg)",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}><div><div style={{fontWeight:700,fontSize:13}}>{entry.meta?.title || entry.chapterId}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{entry.meta ? `${entry.meta.courseIcon} ${entry.meta.courseTitle} · ${entry.meta.level}` : "Leçon supprimée ou renommée"}</div></div><div style={{fontSize:12,fontWeight:700,color:"var(--yellow)",whiteSpace:"nowrap"}}>{Math.round(entry.bestScore ?? entry.quizScore ?? 0)}%</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}><span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"var(--yellow)22",color:"var(--yellow)",border:"1px solid var(--yellow)44"}}>Sous 70%</span>{entry.meta?.quizCount != null && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"var(--surface3)",color:"var(--text2)",border:"1px solid var(--border)"}}>{entry.meta.quizCount} question{entry.meta.quizCount > 1 ? "s" : ""}</span>}</div></div>)}</div>
                    </div>
                  </div>
                  <div style={{marginTop:16,border:"1px solid var(--border)",borderRadius:12,background:"var(--surface)",overflow:"hidden"}}>
                    <div style={{padding:"12px 14px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:13}}>📈 Développement piste par piste</div>
                    <div style={{padding:12}}>
                      {u.sessionCount === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>Aucune fiche de session enregistrée.</div> : <>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:14}}>
                          <div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Circuit</div><select className="form-input" value={selectedTrack} onChange={e=>setTrackFilters(prev=>({...prev,[u.id]:e.target.value}))}><option value="">Choisir un circuit</option>{trackOptions.map(track=><option key={track} value={track}>{track}</option>)}</select></div>
                          <div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Graphique affiché</div><select className="form-input" value={selectedMetric} onChange={e=>setMetricFilters(prev=>({...prev,[u.id]:e.target.value}))}>{ADMIN_DEVELOPMENT_METRICS.map(metric=><option key={metric.value} value={metric.value}>{metric.label}</option>)}</select></div>
                          <div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)"}}><div style={{fontSize:18,fontWeight:800,color:"#a855f7"}}>{filteredLogs.length}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>SESSIONS SUR CE CIRCUIT</div></div>
                          <div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)"}}><div style={{fontSize:18,fontWeight:800,color:"var(--accent)"}}>{bestSeconds != null ? formatLapSeconds(bestSeconds) : "—"}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>BEST LOGGÉ</div></div>
                          <div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)"}}><div style={{fontSize:18,fontWeight:800,color:"var(--blue)"}}>{bestFinish != null ? `P${bestFinish}` : "—"}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>MEILLEURE ARRIVÉE</div></div>
                          <div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--border)"}}><div style={{fontSize:18,fontWeight:800,color:"#fb7185"}}>{totalCrashes}</div><div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>CRASHS LOGGÉS</div></div>
                        </div>
                        {!selectedTrack ? <div style={{fontSize:12,color:"var(--text3)",padding:"4px 0 8px"}}>Sélectionne un circuit pour afficher la courbe et les fiches correspondantes.</div> : <>
                          <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:10}}>Un seul graphique à la fois pour garder la lecture claire côté coaching. Vue active : <span style={{color:"var(--text1)"}}>{metricMeta.title}</span>.</div>
                          <AdminDevelopmentMetricChart points={chartPoints} metric={selectedMetric} title={`${selectedTrack} · ${metricMeta.title.toLowerCase()}`} />
                          <div style={{marginTop:14,maxHeight:360,overflowY:"auto",display:"grid",gap:8}}>{filteredLogs.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>Aucune fiche pour ce circuit.</div> : filteredLogs.map(log => <div key={log.id} style={{padding:12,border:"1px solid var(--border)",borderRadius:10,background:"var(--bg)"}}><div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start",flexWrap:"wrap"}}><div><div style={{fontWeight:700,fontSize:13}}>{log.session_date ? new Date(`${log.session_date}T12:00:00`).toLocaleDateString("fr-FR") : "Sans date"}{log.car ? ` · ${log.car}` : ""}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{selectedTrack}{log.updated_at ? ` · maj ${new Date(log.updated_at).toLocaleDateString("fr-FR")} ${new Date(log.updated_at).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}` : ""}</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{log.best_lap && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"#e11d4822",color:"#ff6b8a",border:"1px solid #e11d4844"}}>Best {log.best_lap}</span>}{log.average_lap && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"var(--surface3)",color:"var(--text2)",border:"1px solid var(--border)"}}>Avg {log.average_lap}</span>}{log.starting_position != null && log.starting_position !== '' && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"#141924",color:"#9db4ff",border:"1px solid #243047"}}>Départ P{log.starting_position}</span>}{log.finishing_position != null && log.finishing_position !== '' && <span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"#132018",color:"#8ee7a8",border:"1px solid #214430"}}>Arrivée P{log.finishing_position}</span>}<span style={{fontSize:10,padding:"4px 8px",borderRadius:999,background:"#241617",color:"#fca5a5",border:"1px solid #462023"}}>{Math.max(0, parseInt(log.crash_count, 10) || 0)} crash{Math.max(0, parseInt(log.crash_count, 10) || 0) === 1 ? '' : 's'}</span></div></div>{(log.focus || log.main_mistake || log.notes) && <div style={{display:"grid",gap:8,marginTop:10}}>{log.focus && <div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Focus</div><div style={{fontSize:12,color:"var(--text1)",lineHeight:1.6}}>{log.focus}</div></div>}{log.main_mistake && <div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Main issue</div><div style={{fontSize:12,color:"var(--text1)",lineHeight:1.6}}>{log.main_mistake}</div></div>}{log.notes && <div><div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Notes</div><div style={{fontSize:12,color:"var(--text1)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{log.notes}</div></div>}</div>}</div>)}</div>
                        </>}
                      </>}
                    </div>
                  </div>
                </div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── COACHING EDITOR ──────────────────────────────────────────
function CoachingEditor({ showToast }) {
  const loadS=()=>{try{const s=localStorage.getItem("acc-coaching-settings");return s?JSON.parse(s):{}}catch{return{}}};
  const [settings, setSettings] = useState(loadS);
  const c = settings.coaching || {title:"1-on-1 Coaching",subtitle:"Take your driving to the next level with a personalized solo session",sessionTitle:"Solo Session",sessionSub:"1 hour · Private · All levels",sessionDesc:"Get dedicated attention from an experienced ACC coach.",features:["Telemetry analysis & driving review","Personalized technique training","Custom improvement plan","Controller & setup optimization","Race strategy & racecraft coaching"],bookUrl:"https://www.xboxcommunityleague.com/shop",bookLabel:"Book Your Session"};
  const upd=(fn)=>{setSettings(prev=>{const next={...prev,coaching:{...c}};fn(next.coaching);localStorage.setItem("acc-coaching-settings",JSON.stringify(next));return next})};
  const saveCoaching=async()=>{
    const { data: { user }, error: userError } = await sb.auth.getUser();
    if (userError || !user || user.email !== ADMIN_EMAIL) { showToast("Session admin invalide — reconnectez-vous", "error"); return; }
    const s=JSON.parse(localStorage.getItem("acc-coaching-settings")||"{}");
    const ok=await sbSaveContent("settings",s);
    showToast(ok?"Page coaching sauvegardée et synchronisée !":"Erreur — reconnectez-vous",ok?"success":"error");
  };

  return(<div>
    <div className="card"><div className="card-header"><div className="card-title">📝 Textes de la page</div></div><div className="card-body">
      <div className="form-group"><label className="form-label">Titre principal</label><input className="form-input" value={c.title} onChange={e=>upd(d=>{d.title=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Sous-titre</label><input className="form-input" value={c.subtitle} onChange={e=>upd(d=>{d.subtitle=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Titre session</label><input className="form-input" value={c.sessionTitle} onChange={e=>upd(d=>{d.sessionTitle=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Sous-titre session</label><input className="form-input" value={c.sessionSub} onChange={e=>upd(d=>{d.sessionSub=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" rows={3} value={c.sessionDesc} onChange={e=>upd(d=>{d.sessionDesc=e.target.value})}/></div>
    </div></div>
    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">✨ Avantages listés</div><button className="btn btn-sm btn-primary" onClick={()=>upd(d=>{d.features=[...d.features,"Nouvel avantage"]})}>+ Ajouter</button></div><div className="card-body">
      {(c.features||[]).map((f,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
        <input className="form-input" style={{marginBottom:0}} value={f} onChange={e=>upd(d=>{d.features[i]=e.target.value})}/>
        {i>0&&<button className="btn-icon" onClick={()=>upd(d=>{const t=d.features[i];d.features[i]=d.features[i-1];d.features[i-1]=t})}>↑</button>}
        <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>upd(d=>{d.features.splice(i,1)})}>✗</button>
      </div>)}
    </div></div>
    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">🔗 Bouton de réservation</div></div><div className="card-body">
      <div className="form-group"><label className="form-label">URL de réservation</label><input className="form-input" value={c.bookUrl||""} onChange={e=>upd(d=>{d.bookUrl=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Texte du bouton</label><input className="form-input" value={c.bookLabel||""} onChange={e=>upd(d=>{d.bookLabel=e.target.value})}/></div>
    </div></div>
    <button className="btn btn-primary" style={{marginTop:16}} onClick={saveCoaching}>💾 Sauvegarder et synchroniser</button>
  </div>);
}

// ─── HOME LAYOUT EDITOR ──────────────────────────────────────
function HomeLayoutEditor({ courses, updateCourses, showToast }) {
  const loadS=()=>{try{const s=localStorage.getItem("acc-coaching-settings");return s?JSON.parse(s):{}}catch{return{}}};
  const [settings, setSettings] = useState(loadS);
  const layout = settings.homeLayout || ["nextLesson","courses"];
  const setLayout=(newLayout)=>{const next={...settings,homeLayout:newLayout};setSettings(next);localStorage.setItem("acc-coaching-settings",JSON.stringify(next))};
  const saveLayout=async()=>{
    const { data: { user }, error: userError } = await sb.auth.getUser();
    if (userError || !user || user.email !== ADMIN_EMAIL) { showToast("Session admin invalide — reconnectez-vous", "error"); return; }
    const s=JSON.parse(localStorage.getItem("acc-coaching-settings")||"{}");
    const ok=await sbSaveContent("settings",s);
    showToast(ok?"Layout sauvegardé et synchronisé !":"Erreur — reconnectez-vous",ok?"success":"error");
  };

  const blockLabels={nextLesson:"🎯 Next Lesson (mise en avant)",courses:"📚 Liste des parcours"};

  return(<div>
    <div className="card"><div className="card-header"><div className="card-title">🏠 Ordre des blocs sur l'accueil</div></div><div className="card-body">
      <div className="para-hint">Déplace les blocs pour changer l'ordre. "Next Lesson" en haut = mise en avant.</div>
      {layout.map((key,i)=>(
        <div key={key} className="list-item">
          <span className="drag-handle">☰</span>
          <div className="item-info"><div className="item-title">{blockLabels[key]||key}</div></div>
          <div className="item-actions">
            {i>0&&<button className="btn-icon" onClick={()=>{const n=[...layout];const t=n[i];n[i]=n[i-1];n[i-1]=t;setLayout(n)}}>↑</button>}
            {i<layout.length-1&&<button className="btn-icon" onClick={()=>{const n=[...layout];const t=n[i];n[i]=n[i+1];n[i+1]=t;setLayout(n)}}>↓</button>}
          </div>
        </div>
      ))}
    </div></div>

    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">📚 Ordre des parcours</div></div><div className="card-body">
      <div className="para-hint">Change l'ordre d'affichage des parcours dans l'app.</div>
      {courses.map((c,ci)=>(
        <div key={c.id} className="list-item">
          <span style={{fontSize:24}}>{c.icon}</span>
          <div className="item-info"><div className="item-title">{c.title}</div><div className="item-sub">{c.levels.reduce((s,l)=>s+l.chapters.length,0)} chapitres</div></div>
          <div className="item-actions">
            {ci>0&&<button className="btn-icon" onClick={()=>updateCourses(d=>{const t=d[ci];d[ci]=d[ci-1];d[ci-1]=t})}>↑</button>}
            {ci<courses.length-1&&<button className="btn-icon" onClick={()=>updateCourses(d=>{const t=d[ci];d[ci]=d[ci+1];d[ci+1]=t})}>↓</button>}
          </div>
        </div>
      ))}
    </div></div>
    <button className="btn btn-primary" style={{marginTop:16}} onClick={saveLayout}>💾 Sauvegarder et synchroniser</button>
  </div>);
}

// ─── RENDER ───────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp/>);
</script>
</body>
</html>
