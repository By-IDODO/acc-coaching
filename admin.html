const loadData = () => {
  try { const d = localStorage.getItem(DATA_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
};
const saveData = (data) => {
  try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); return true; } catch { return false; }
};
// Supabase content sync
const sbLoadContent=async(key)=>{try{const{data,error}=await sb.from("app_content").select("data").eq("key",key).maybeSingle();if(error)console.warn("Load error:",error);return data?.data||null}catch(e){console.warn("Load catch:",e);return null}};
const sbSaveContent=async(key,val)=>{try{const{error}=await sb.from("app_content").upsert({key,data:val,updated_at:new Date().toISOString()});if(error){console.error("Save error:",error);return false}return true}catch(e){console.error("Save catch:",e);return false}};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ─── TOAST ────────────────────────────────────────────────────
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className={`toast toast-${type}`}>{type === "success" ? "✓" : "✗"} {message}</div>;
}

// ─── APP ──────────────────────────────────────────────────────
function AdminApp() {
  const [authUser, setAuthUser] = useState(undefined);
  const [courses, setCourses] = useState(() => loadData() || JSON.parse(JSON.stringify(DEFAULT_COURSES)));
  const [selected, setSelected] = useState({ type:"dashboard" });
  const [toast, setToast] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [hasChanges, setHasChanges] = useState(false);
  const [isSaving, setIsSaving] = useState(false);
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginErr, setLoginErr] = useState("");

  const showToast = (message, type="success") => setToast({ message, type, key: Date.now() });

  const save = useCallback(async () => {
    if (isSaving) return;

    setIsSaving(true);

    try {
      console.log("[ADMIN SAVE] start", new Date().toISOString());

      const { data: refreshData, error: refreshError } = await sb.auth.refreshSession();
      if (refreshError || !refreshData?.session) {
        console.error("[ADMIN SAVE] refresh session error:", refreshError);
        showToast("Session expirée — reconnectez-vous", "error");
        return;
      }

      const localOk = saveData(courses);
      if (!localOk) {
        console.error("[ADMIN SAVE] localStorage save failed");
        showToast("Erreur localStorage — sauvegarde annulée", "error");
        return;
      }

      const settings = JSON.parse(localStorage.getItem("acc-coaching-settings") || "{}");
      const r1 = await sbSaveContent("courses", courses);
      const r2 = await sbSaveContent("settings", settings);

      if (r1 && r2) {
        setHasChanges(false);
        showToast("Sauvegardé et synchronisé !");
        console.log("[ADMIN SAVE] success");
      } else {
        console.error("[ADMIN SAVE] sync failed", { coursesSaved: r1, settingsSaved: r2 });
        showToast("Erreur synchro — reconnectez-vous", "error");
      }
    } catch (e) {
      console.error("[ADMIN SAVE] unexpected error:", e);
      showToast("Erreur — reconnectez-vous", "error");
    } finally {
      setIsSaving(false);
    }
  }, [courses, isSaving]);

  // Load latest from Supabase on admin login
  useEffect(() => {
    sb.auth.getSession().then(({data:{session}})=>{setAuthUser(session?.user||null)});
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(_,session)=>{
      setAuthUser(session?.user||null);
      if(session?.user){
        const remoteCourses=await sbLoadContent("courses");
        if(remoteCourses){setCourses(remoteCourses);saveData(remoteCourses)}
        const remoteSettings=await sbLoadContent("settings");
        if(remoteSettings){localStorage.setItem("acc-coaching-settings",JSON.stringify(remoteSettings))}
      }
    });
    return()=>subscription.unsubscribe();
  }, []);

  const updateCourses = (fn) => {
    setCourses(prev => { const next = JSON.parse(JSON.stringify(prev)); fn(next); return next; });
    setHasChanges(true);
  };

  const nav = (sel) => { setSelected(sel); setSidebarOpen(false); };

  // Count helpers
  const totalChapters = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.length, 0), 0);
  const totalQuiz = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.reduce((s3,ch) => s3 + ch.quiz.length, 0), 0), 0);

  function doLogin(){
    setLoginErr("");
    sb.auth.signInWithPassword({email:loginEmail,password:loginPass}).then(({error})=>{if(error)setLoginErr(error.message)});
  }

  // Auth gate: must be logged in with admin email
  if (authUser === undefined) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#101114",color:"#e4e4e7",fontFamily:"'DM Sans',sans-serif"}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⚙️</div><div>Chargement...</div></div></div>;
  if (authUser === null || authUser.email !== ADMIN_EMAIL) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#101114",color:"#e4e4e7",fontFamily:"'DM Sans',sans-serif",padding:20}}>
      <div style={{maxWidth:380,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:40,marginBottom:8}}>🔒</div><div style={{fontSize:20,fontWeight:700}}>Admin Panel</div><div style={{fontSize:12,color:"#9294a0",marginTop:4}}>Connexion requise — accès réservé à l'administrateur</div></div>
        <div style={{background:"#16171c",border:"1px solid #2a2b33",borderRadius:12,padding:24}}>
          {loginErr && <div style={{color:"#ef4444",fontSize:12,marginBottom:12,padding:"8px 12px",background:"#ef444415",borderRadius:6}}>{loginErr}</div>}
          {authUser && authUser.email !== ADMIN_EMAIL && <div style={{color:"#f59e0b",fontSize:12,marginBottom:12,padding:"8px 12px",background:"#f59e0b15",borderRadius:6}}>⚠️ {authUser.email} n'est pas autorisé. <button style={{background:"none",border:"none",color:"#e11d48",cursor:"pointer",fontWeight:700}} onClick={()=>sb.auth.signOut()}>Se déconnecter</button></div>}
          <input style={{width:"100%",padding:"10px 14px",background:"#101114",border:"1px solid #2a2b33",borderRadius:8,color:"#e4e4e7",fontSize:14,marginBottom:10}} type="email" placeholder="Email admin" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}/>
          <input style={{width:"100%",padding:"10px 14px",background:"#101114",border:"1px solid #2a2b33",borderRadius:8,color:"#e4e4e7",fontSize:14,marginBottom:12}} type="password" placeholder="Mot de passe" value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={doLogin}>Se connecter</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="admin-layout">
      {/* Sidebar */}
      <div className={`sidebar ${sidebarOpen ? "open" : ""}`}>
        <div className="sidebar-header">
          <div className="sidebar-logo"><span>⚙️</span><span>ACC Admin</span></div>
          <div className="sidebar-sub">Gestion du contenu</div>
        </div>
        <div className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Navigation</div>
            <button className={`nav-item ${selected.type==="dashboard"?"active":""}`} onClick={()=>nav({type:"dashboard"})}>
              <span className="nav-icon">📊</span> Dashboard
            </button>
            <button className={`nav-item ${selected.type==="users"?"active":""}`} onClick={()=>nav({type:"users"})}>
              <span className="nav-icon">👥</span> Utilisateurs
            </button>
            <button className={`nav-item ${selected.type==="coaching"?"active":""}`} onClick={()=>nav({type:"coaching"})}>
              <span className="nav-icon">🎯</span> Page Coaching
            </button>
            <button className={`nav-item ${selected.type==="homeLayout"?"active":""}`} onClick={()=>nav({type:"homeLayout"})}>
              <span className="nav-icon">🏠</span> Layout Accueil
            </button>
          </div>
          {courses.map((course, ci) => (
            <div key={course.id} className="nav-section">
              <div className="nav-section-title">{course.icon} {course.title}</div>
              <button className={`nav-item ${selected.type==="course"&&selected.ci===ci?"active":""}`} onClick={()=>nav({type:"course",ci})}>
                <span className="nav-icon">📝</span> Infos du parcours
              </button>
              {course.levels.map((level, li) => (
                <div key={li}>
                  {level.chapters.map((ch, chi) => (
                    <button key={ch.id} className={`nav-item ${selected.type==="chapter"&&selected.ci===ci&&selected.li===li&&selected.chi===chi?"active":""}`}
                      onClick={()=>nav({type:"chapter",ci,li,chi})}>
                      <span className="nav-icon"><span className="color-dot" style={{background:level.color,display:"inline-block"}}/></span>
                      <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ch.title}</span>
                    </button>
                  ))}
                  <button className="nav-item" style={{color:"var(--accent)",fontSize:12}} onClick={() => {
                    updateCourses(d => {
                      d[ci].levels[li].chapters.push({ id:uid(), title:"Nouveau chapitre", desc:"Description...", videoUrl:"", content:["Contenu de la leçon..."], quiz:[] });
                    });
                    const newChi = course.levels[li].chapters.length; // will be length after push
                    setTimeout(() => nav({type:"chapter",ci,li,chi:newChi}), 50);
                  }}>
                    <span className="nav-icon">+</span> Ajouter chapitre
                  </button>
                </div>
              ))}
            </div>
          ))}
          <div className="nav-section">
            <button className="nav-item" style={{color:"var(--accent)"}} onClick={() => {
              updateCourses(d => {
                d.push({ id:uid(), title:"Nouveau parcours", icon:"📚", desc:"Description du parcours", levels:[{level:"Débutant",color:"#22c55e",chapters:[]}] });
              });
            }}>
              <span className="nav-icon">+</span> Nouveau parcours
            </button>
          </div>
        </div>
        <div className="sidebar-footer">
          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",opacity:isSaving?0.7:1,cursor:isSaving?"not-allowed":"pointer"}} onClick={save} disabled={isSaving}>
            {isSaving ? "⏳ Sauvegarde..." : `💾 ${hasChanges ? "Enregistrer *" : "Enregistrer"}`}
          </button>
          <button className="btn btn-secondary" style={{width:"100%",justifyContent:"center"}} onClick={() => {
            const json = JSON.stringify(courses, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = "acc-coaching-data.json"; a.click();
            URL.revokeObjectURL(url);
            showToast("Export téléchargé !");
          }}>
            📥 Exporter JSON
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="main-header">
          <div>
            <div className="main-title">
              {selected.type === "dashboard" && "Dashboard"}
              {selected.type === "users" && "Utilisateurs"}
              {selected.type === "coaching" && "Page Coaching"}
              {selected.type === "homeLayout" && "Layout Accueil"}
              {selected.type === "course" && courses[selected.ci]?.title}
              {selected.type === "chapter" && courses[selected.ci]?.levels[selected.li]?.chapters[selected.chi]?.title}
            </div>
            <div className="main-subtitle">
              {selected.type === "dashboard" && `${courses.length} parcours · ${totalChapters} chapitres · ${totalQuiz} questions`}
              {selected.type === "users" && "Gestion des comptes et accès premium"}
              {selected.type === "coaching" && "Modifier les textes de la page coaching"}
              {selected.type === "homeLayout" && "Réordonner les blocs de la page d'accueil et les parcours"}
              {selected.type === "course" && "Paramètres du parcours"}
              {selected.type === "chapter" && `${courses[selected.ci]?.title} › ${courses[selected.ci]?.levels[selected.li]?.level}`}
            </div>
          </div>
          <div className="main-actions">
            {hasChanges && <span style={{fontSize:12,color:"var(--yellow)"}}>● Non sauvé</span>}
            <button className="btn btn-primary" onClick={save} disabled={isSaving} style={{opacity:isSaving?0.7:1,cursor:isSaving?"not-allowed":"pointer"}}>
              {isSaving ? "⏳ Sauvegarde..." : "💾 Sauvegarder"}
            </button>
          </div>
        </div>
        <div className="main-content">
          {selected.type === "dashboard" && <DashboardView courses={courses} nav={nav} updateCourses={updateCourses} showToast={showToast}/>}
          {selected.type === "users" && <UsersView showToast={showToast}/>}
          {selected.type === "coaching" && <CoachingEditor showToast={showToast}/>}
          {selected.type === "homeLayout" && <HomeLayoutEditor courses={courses} updateCourses={updateCourses} showToast={showToast}/>}
          {selected.type === "course" && <CourseEditor courses={courses} ci={selected.ci} updateCourses={updateCourses} nav={nav} showToast={showToast}/>}
          {selected.type === "chapter" && <ChapterEditor courses={courses} ci={selected.ci} li={selected.li} chi={selected.chi} updateCourses={updateCourses} showToast={showToast}/>}
        </div>
      </div>

      <button className="mobile-menu-btn" onClick={() => setSidebarOpen(!sidebarOpen)}>☰</button>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onDone={() => setToast(null)}/>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────
function DashboardView({ courses, nav, updateCourses, showToast }) {
  const fileRef = useRef();
  const totalCh = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.length, 0), 0);
  const totalQ = courses.reduce((s,c) => s + c.levels.reduce((s2,l) => s2 + l.chapters.reduce((s3,ch) => s3 + ch.quiz.length, 0), 0), 0);

  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data) && data[0]?.levels) {
          updateCourses(() => {}); // trigger change
          localStorage.setItem("acc-coaching-courses", JSON.stringify(data));
          window.location.reload();
        } else { showToast("Format JSON invalide", "error"); }
      } catch { showToast("Erreur de lecture JSON", "error"); }
    };
    reader.readAsText(file);
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--accent)"}}>{courses.length}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>PARCOURS</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--blue)"}}>{totalCh}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>CHAPITRES</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--green)"}}>{totalQ}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>QUESTIONS QUIZ</div></div></div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">📚 Parcours</div>
          <button className="btn btn-sm btn-primary" onClick={() => {
            updateCourses(d => d.push({id:uid(),title:"Nouveau parcours",icon:"📚",desc:"Description",levels:[{level:"Débutant",color:"#22c55e",chapters:[]}]}));
          }}>+ Ajouter</button>
        </div>
        <div className="card-body">
          {courses.map((c, ci) => (
            <div key={c.id} className="list-item">
              <span style={{fontSize:24}}>{c.icon}</span>
              <div className="item-info">
                <div className="item-title">{c.title}</div>
                <div className="item-sub">{c.levels.reduce((s,l)=>s+l.chapters.length,0)} chapitres · {c.levels.length} niveaux</div>
              </div>
              <div className="item-actions">
                <button className="btn-icon" onClick={()=>nav({type:"course",ci})} title="Modifier">✏️</button>
                <button className="btn-icon" onClick={()=>{if(confirm("Supprimer ce parcours ?"))updateCourses(d=>d.splice(ci,1))}} title="Supprimer">🗑️</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="card-header"><div className="card-title">🔧 Outils</div></div>
        <div className="card-body" style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-secondary" onClick={() => fileRef.current?.click()}>📤 Importer JSON</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
          <button className="btn btn-secondary" onClick={() => {
            const json = JSON.stringify(courses, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download="acc-coaching-data.json"; a.click();
          }}>📥 Exporter JSON</button>
          <button className="btn btn-danger" onClick={() => {
            if (confirm("⚠️ Réinitialiser TOUT le contenu aux valeurs par défaut ? Cette action est irréversible.")) {
              localStorage.removeItem(DATA_KEY);
              localStorage.removeItem(PROGRESS_KEY);
              window.location.reload();
            }
          }}>🔄 Réinitialiser tout</button>
        </div>
      </div>
    </div>
  );
}

// ─── COURSE EDITOR ────────────────────────────────────────────
function CourseEditor({ courses, ci, updateCourses, nav, showToast }) {
  const course = courses[ci];
  if (!course) return <div className="empty-state"><div className="empty-icon">❌</div><div className="empty-text">Parcours introuvable</div></div>;

  const ICONS = ["🏎️","⚔️","🔧","🏁","🎯","⚡","🛞","🌧️","🏆","📚","💡","🎮"];
  const COLORS = ["#22c55e","#f59e0b","#ef4444","#3b82f6","#8b5cf6","#ec4899","#06b6d4","#f97316"];

  return (
    <div>
      <div className="card">
        <div className="card-header"><div className="card-title">Informations du parcours</div></div>
        <div className="card-body">
          <div className="form-group">
            <label className="form-label">Icône</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {ICONS.map(ic => (
                <button key={ic} style={{fontSize:24,width:40,height:40,borderRadius:8,border:course.icon===ic?"2px solid var(--accent)":"1px solid var(--border)",background:course.icon===ic?"var(--accent)15":"var(--bg)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>updateCourses(d=>{d[ci].icon=ic})}>{ic}</button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Titre du parcours</label>
            <input className="form-input" value={course.title} onChange={e=>updateCourses(d=>{d[ci].title=e.target.value})} placeholder="Ex: Pilotage Pur"/>
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={course.desc} onChange={e=>updateCourses(d=>{d[ci].desc=e.target.value})} placeholder="Description courte du parcours"/>
          </div>
        </div>
      </div>

      <div className="card" style={{marginTop:16}}>
        <div className="card-header">
          <div className="card-title">📊 Niveaux ({course.levels.length})</div>
          <button className="btn btn-sm btn-primary" onClick={()=>updateCourses(d=>{d[ci].levels.push({level:"Nouveau niveau",color:"#3b82f6",chapters:[]})})}>+ Ajouter niveau</button>
        </div>
        <div className="card-body">
          {course.levels.map((level, li) => (
            <div key={li} className="list-item" style={{borderLeft:`3px solid ${level.color}`}}>
              <div className="item-info">
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input className="form-input" style={{padding:"4px 8px",width:180,fontSize:13}} value={level.level} onChange={e=>updateCourses(d=>{d[ci].levels[li].level=e.target.value})}/>
                  <div style={{display:"flex",gap:3}}>
                    {COLORS.map(col => (
                      <button key={col} style={{width:18,height:18,borderRadius:"50%",background:col,border:level.color===col?"2px solid #fff":"1px solid #333",cursor:"pointer"}}
                        onClick={()=>updateCourses(d=>{d[ci].levels[li].color=col})}/>
                    ))}
                  </div>
                </div>
                <div className="item-sub">{level.chapters.length} chapitres</div>
              </div>
              <div className="item-actions">
                {li > 0 && <button className="btn-icon" title="Monter" onClick={()=>updateCourses(d=>{const t=d[ci].levels[li];d[ci].levels[li]=d[ci].levels[li-1];d[ci].levels[li-1]=t})}>↑</button>}
                {li < course.levels.length-1 && <button className="btn-icon" title="Descendre" onClick={()=>updateCourses(d=>{const t=d[ci].levels[li];d[ci].levels[li]=d[ci].levels[li+1];d[ci].levels[li+1]=t})}>↓</button>}
                <button className="btn-icon" title="Supprimer" onClick={()=>{if(confirm("Supprimer ce niveau et tous ses chapitres ?"))updateCourses(d=>{d[ci].levels.splice(li,1)})}}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:20}}>
        <button className="btn btn-danger" onClick={()=>{if(confirm("Supprimer le parcours \""+course.title+"\" ?")) { updateCourses(d=>d.splice(ci,1)); nav({type:"dashboard"}); }}}>🗑️ Supprimer ce parcours</button>
      </div>
    </div>
  );
}

// ─── CHAPTER EDITOR ───────────────────────────────────────────
function ChapterEditor({ courses, ci, li, chi, updateCourses, showToast }) {
  const [tab, setTab] = useState("info");
  const chapter = courses[ci]?.levels[li]?.chapters[chi];
  if (!chapter) return <div className="empty-state"><div className="empty-icon">❌</div><div className="empty-text">Chapitre introuvable</div></div>;

  const update = (fn) => updateCourses(d => fn(d[ci].levels[li].chapters[chi]));

  return (
    <div>
      <div className="status-bar">
        ✓ Chapitre : {chapter.content.filter(b => typeof b === "string" || (typeof b === "object" && b.type !== "image")).length} textes · {chapter.content.filter(b => typeof b === "object" && b.type === "image").length} images · {chapter.quiz.length} questions quiz · Vidéo : {chapter.videoUrl ? "✓" : "✗"}
      </div>

      <div className="tabs">
        <button className={`tab ${tab==="info"?"active":""}`} onClick={()=>setTab("info")}>ℹ️ Infos</button>
        <button className={`tab ${tab==="content"?"active":""}`} onClick={()=>setTab("content")}>📖 Contenu</button>
        <button className={`tab ${tab==="video"?"active":""}`} onClick={()=>setTab("video")}>🎬 Vidéo</button>
        <button className={`tab ${tab==="quiz"?"active":""}`} onClick={()=>setTab("quiz")}>✅ Quiz ({chapter.quiz.length})</button>
        <button className={`tab ${tab==="danger"?"active":""}`} onClick={()=>setTab("danger")}>⚠️</button>
      </div>

      {/* INFO TAB */}
      {tab === "info" && (
        <div className="card">
          <div className="card-body">
            <div className="form-group">
              <label className="form-label">Titre du chapitre</label>
              <input className="form-input" value={chapter.title} onChange={e=>update(ch=>{ch.title=e.target.value})} placeholder="Ex: Les bases du freinage"/>
            </div>
            <div className="form-group">
              <label className="form-label">Description courte</label>
              <input className="form-input" value={chapter.desc} onChange={e=>update(ch=>{ch.desc=e.target.value})} placeholder="Ex: Apprends à freiner efficacement"/>
            </div>
            <div className="form-group">
              <label className="form-label">Identifiant unique</label>
              <input className="form-input" value={chapter.id} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--text3)"}} readOnly/>
            </div>
          </div>
        </div>
      )}

      {/* CONTENT TAB */}
      {tab === "content" && (
        <div>
          <div className="para-hint">💡 **texte** = gras rouge. Types : Texte (3 tailles), Titre, Encadré, Image. Réordonne librement.</div>
          {chapter.content.map((block, pi) => {
            const bType = typeof block === "object" ? (block.type || "text") : "text";
            const isImage = bType === "image";
            const isHeading = bType === "heading";
            const isCallout = bType === "callout";
            const isText = !isImage && !isHeading && !isCallout;
            const textVal = typeof block === "string" ? block : (block.value || "");
            const size = typeof block === "object" ? (block.size || "normal") : "normal";
            const typeLabels = {text:"📝 Texte",heading:"🔤 Titre",callout:"💡 Encadré",image:"🖼️ Image"};
            const typeColors = {text:"var(--text3)",heading:"var(--accent)",callout:"var(--yellow)",image:"var(--blue)"};
            return (
            <div key={pi} className="para-block">
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{pi+1}</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:typeColors[bType]+"22",color:typeColors[bType]}}>{typeLabels[bType]||bType}</span>
                {isText && <select style={{fontSize:10,padding:"2px 6px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text2)"}} value={size} onChange={e=>update(ch=>{ch.content[pi]=typeof ch.content[pi]==="string"?{type:"text",value:ch.content[pi],size:e.target.value}:{...ch.content[pi],size:e.target.value}})}>
                  <option value="small">Petit</option><option value="normal">Normal</option><option value="large">Grand</option>
                </select>}
                <div style={{flex:1}}/>
                {pi > 0 && <button className="btn-icon btn-sm" title="Monter" onClick={()=>update(ch=>{const t=ch.content[pi];ch.content[pi]=ch.content[pi-1];ch.content[pi-1]=t})}>↑</button>}
                {pi < chapter.content.length-1 && <button className="btn-icon btn-sm" title="Descendre" onClick={()=>update(ch=>{const t=ch.content[pi];ch.content[pi]=ch.content[pi+1];ch.content[pi+1]=t})}>↓</button>}
                <button className="btn-icon btn-sm" style={{color:"var(--red)"}} title="Supprimer" onClick={()=>update(ch=>{ch.content.splice(pi,1)})}>✗</button>
              </div>
              {isImage ? (
                <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:12}}>
                  <div className="form-group" style={{marginBottom:8}}>
                    <label className="form-label">URL de l'image</label>
                    <input className="form-input" value={block.url||""} onChange={e=>update(ch=>{ch.content[pi]={...ch.content[pi],url:e.target.value}})} placeholder="https://example.com/image.jpg"/>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label className="form-label">Légende (optionnel)</label>
                    <input className="form-input" value={block.caption||""} onChange={e=>update(ch=>{ch.content[pi]={...ch.content[pi],caption:e.target.value}})} placeholder="Description de l'image..."/>
                  </div>
                  {block.url && <div style={{marginTop:8,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><img src={block.url} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}} alt={block.caption||""}/></div>}
                </div>
              ) : isHeading ? (
                <input className="form-input" style={{fontSize:18,fontWeight:700}} value={textVal} onChange={e=>update(ch=>{ch.content[pi]={type:"heading",value:e.target.value}})} placeholder="Titre de section..."/>
              ) : (
                <textarea className="form-input" style={{fontSize:isCallout?13:size==="large"?16:size==="small"?12:14}} value={textVal} rows={3} onChange={e=>update(ch=>{
                  if(typeof ch.content[pi]==="string"){ch.content[pi]=isCallout?{type:"callout",value:e.target.value}:e.target.value}
                  else{ch.content[pi]={...ch.content[pi],value:e.target.value}}
                })} placeholder={isCallout?"Texte de l'encadré...":"Contenu du paragraphe..."}/>
              )}
            </div>
          )})}
          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <button className="btn btn-secondary" onClick={()=>update(ch=>{ch.content.push("")})}>📝 Texte</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--accent)30",color:"var(--accent)"}} onClick={()=>update(ch=>{ch.content.push({type:"heading",value:""})})}>🔤 Titre</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--yellow)30",color:"var(--yellow)"}} onClick={()=>update(ch=>{ch.content.push({type:"callout",value:""})})}>💡 Encadré</button>
            <button className="btn btn-secondary" style={{borderColor:"var(--blue)30",color:"var(--blue)"}} onClick={()=>update(ch=>{ch.content.push({type:"image",url:"",caption:""})})}>🖼️ Image</button>
          </div>
        </div>
      )}

      {/* VIDEO TAB */}
      {tab === "video" && (
        <div className="card">
          <div className="card-body">
            <div className="form-group">
              <label className="form-label">URL de la vidéo YouTube (embed)</label>
              <input className="form-input" value={chapter.videoUrl} onChange={e=>update(ch=>{ch.videoUrl=e.target.value})} placeholder="https://www.youtube.com/embed/XXXXXX"/>
              <div className="para-hint" style={{marginTop:8}}>
                Pour obtenir le lien embed : va sur YouTube → Partager → Intégrer → copie le lien src="https://www.youtube.com/embed/..."
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Source / Crédit vidéo (optionnel)</label>
              <input className="form-input" value={chapter.videoSource||""} onChange={e=>update(ch=>{ch.videoSource=e.target.value||undefined})} placeholder="Ex: Aris.Drives YouTube Channel"/>
              <div className="para-hint" style={{marginTop:4}}>Affiché en petit sous la vidéo dans l'app</div>
            </div>
            {chapter.videoUrl && (
              <div style={{marginTop:12}}>
                <label className="form-label">Aperçu</label>
                <div style={{borderRadius:8,overflow:"hidden",border:"1px solid var(--border)"}}>
                  <iframe src={chapter.videoUrl} style={{width:"100%",aspectRatio:"16/9",border:"none"}} allowFullScreen/>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* QUIZ TAB */}
      {tab === "quiz" && (
        <div>
          {chapter.quiz.length === 0 && (
            <div className="empty-state">
              <div className="empty-icon">✅</div>
              <div className="empty-text">Aucune question</div>
              <div className="empty-sub">Ajoute des questions pour valider ce chapitre</div>
            </div>
          )}
          {chapter.quiz.map((q, qi) => (
            <div key={qi} className="card" style={{marginBottom:12}}>
              <div className="card-header">
                <div className="card-title">
                  <span style={{color:"var(--accent)",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>Q{qi+1}</span>
                  Question {qi+1}
                </div>
                <div style={{display:"flex",gap:4}}>
                  {qi > 0 && <button className="btn-icon btn-sm" onClick={()=>update(ch=>{const t=ch.quiz[qi];ch.quiz[qi]=ch.quiz[qi-1];ch.quiz[qi-1]=t})}>↑</button>}
                  {qi < chapter.quiz.length-1 && <button className="btn-icon btn-sm" onClick={()=>update(ch=>{const t=ch.quiz[qi];ch.quiz[qi]=ch.quiz[qi+1];ch.quiz[qi+1]=t})}>↓</button>}
                  <button className="btn-icon btn-sm" style={{color:"var(--red)"}} onClick={()=>update(ch=>{ch.quiz.splice(qi,1)})}>🗑️</button>
                </div>
              </div>
              <div className="card-body">
                <div className="form-group">
                  <label className="form-label">Question</label>
                  <input className="form-input" value={q.question} onChange={e=>update(ch=>{ch.quiz[qi].question=e.target.value})} placeholder="Pose ta question ici..."/>
                </div>
                <div className="form-group">
                  <label className="form-label">🖼️ Image de la question (optionnel)</label>
                  <input className="form-input" value={q.image||""} onChange={e=>update(ch=>{ch.quiz[qi].image=e.target.value||undefined})} placeholder="https://example.com/image.jpg"/>
                  {q.image && <div style={{marginTop:6,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><img src={q.image} style={{width:"100%",maxHeight:150,objectFit:"cover",display:"block"}} alt=""/></div>}
                </div>
                <div className="form-group">
                  <label className="form-label">🎬 Vidéo de la question (optionnel)</label>
                  <input className="form-input" value={q.video||""} onChange={e=>update(ch=>{ch.quiz[qi].video=e.target.value||undefined})} placeholder="https://www.youtube.com/embed/XXXXXX"/>
                  <div className="para-hint" style={{marginTop:4}}>Lien embed YouTube uniquement. Ex: https://www.youtube.com/embed/abc123</div>
                  {q.video && <div style={{marginTop:6,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}><iframe src={q.video} style={{width:"100%",aspectRatio:"16/9",border:"none"}} allowFullScreen/></div>}
                </div>
                <label className="form-label">Options (clique le cercle vert pour marquer la bonne réponse)</label>
                {q.options.map((opt, oi) => (
                  <div key={oi} className="quiz-option-row">
                    <span style={{fontSize:11,color:"var(--text3)",width:16,textAlign:"center",fontWeight:600}}>{String.fromCharCode(65+oi)}</span>
                    <input className="form-input" style={{marginBottom:0}} value={opt} onChange={e=>update(ch=>{ch.quiz[qi].options[oi]=e.target.value})} placeholder={`Option ${String.fromCharCode(65+oi)}`}/>
                    <button className={`quiz-option-correct ${q.correct===oi?"is-correct":""}`} onClick={()=>update(ch=>{ch.quiz[qi].correct=oi})} title="Bonne réponse">✓</button>
                    {q.options.length > 2 && <button className="btn-icon btn-sm" style={{color:"var(--red)"}} onClick={()=>update(ch=>{ch.quiz[qi].options.splice(oi,1);if(ch.quiz[qi].correct>=oi&&ch.quiz[qi].correct>0)ch.quiz[qi].correct--})}>✗</button>}
                  </div>
                ))}
                {q.options.length < 6 && (
                  <button className="btn btn-ghost btn-sm" style={{marginTop:4}} onClick={()=>update(ch=>{ch.quiz[qi].options.push("")})}>+ Ajouter option</button>
                )}
              </div>
            </div>
          ))}
          <button className="btn btn-primary" style={{marginTop:8}} onClick={()=>update(ch=>{ch.quiz.push({question:"",options:["","","",""],correct:0})})}>+ Ajouter une question</button>
        </div>
      )}

      {/* DANGER TAB */}
      {tab === "danger" && (
        <div className="card">
          <div className="card-header"><div className="card-title" style={{color:"var(--red)"}}>⚠️ Zone de danger</div></div>
          <div className="card-body">
            <p style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>Ces actions sont irréversibles. Fais attention !</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-danger" onClick={() => {
                if (confirm("Supprimer le chapitre \""+chapter.title+"\" ?\nCette action est irréversible.")) {
                  updateCourses(d => { d[ci].levels[li].chapters.splice(chi, 1); });
                  showToast("Chapitre supprimé");
                }
              }}>🗑️ Supprimer ce chapitre</button>
              <button className="btn btn-secondary" onClick={() => {
                updateCourses(d => {
                  const copy = JSON.parse(JSON.stringify(chapter));
                  copy.id = uid();
                  copy.title = copy.title + " (copie)";
                  d[ci].levels[li].chapters.splice(chi+1, 0, copy);
                });
                showToast("Chapitre dupliqué !");
              }}>📋 Dupliquer ce chapitre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── USERS VIEW ───────────────────────────────────────────────
function UsersView({ showToast }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from("profiles").select("id, display_name, email, premium, created_at, last_active");
      if (data) setUsers(data.sort((a, b) => new Date(b.last_active || 0) - new Date(a.last_active || 0)));
      setLoading(false);
    })();
  }, []);

  const togglePremium = async (uid, current) => {
    await sb.from("profiles").update({ premium: !current }).eq("id", uid);
    setUsers(prev => prev.map(u => u.id === uid ? { ...u, premium: !current } : u));
    showToast(!current ? "Premium activé !" : "Premium retiré");
  };

  if (loading) return <div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>Chargement des utilisateurs...</div>;

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--accent)"}}>{users.length}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>UTILISATEURS</div></div></div>
        <div className="card"><div className="card-body" style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:"var(--yellow)"}}>{users.filter(u=>u.premium).length}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>PREMIUM</div></div></div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">👥 Tous les utilisateurs</div></div>
        <div className="card-body">
          {users.length === 0 ? <div style={{textAlign:"center",color:"var(--text3)",padding:20}}>Aucun utilisateur inscrit</div> :
          users.map(u => (
            <div key={u.id} className="list-item">
              <div style={{width:36,height:36,borderRadius:"50%",background:u.premium?"var(--yellow)22":"var(--surface3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{u.premium?"👑":"👤"}</div>
              <div className="item-info">
                <div className="item-title">{u.display_name || "Sans nom"}</div>
                <div className="item-sub">{u.email} · Inscrit le {new Date(u.created_at).toLocaleDateString("fr-FR")}</div>
              </div>
              <button className={`btn btn-sm ${u.premium?"btn-danger":"btn-primary"}`} onClick={() => togglePremium(u.id, u.premium)} style={{fontSize:11}}>
                {u.premium ? "Retirer Premium" : "👑 Premium"}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── COACHING EDITOR ──────────────────────────────────────────
function CoachingEditor({ showToast }) {
  const loadS=()=>{try{const s=localStorage.getItem("acc-coaching-settings");return s?JSON.parse(s):{}}catch{return{}}};
  const [settings, setSettings] = useState(loadS);
  const c = settings.coaching || {title:"1-on-1 Coaching",subtitle:"Take your driving to the next level with a personalized solo session",sessionTitle:"Solo Session",sessionSub:"1 hour · Private · All levels",sessionDesc:"Get dedicated attention from an experienced ACC coach.",features:["Telemetry analysis & driving review","Personalized technique training","Custom improvement plan","Controller & setup optimization","Race strategy & racecraft coaching"],bookUrl:"https://www.xboxcommunityleague.com/shop",bookLabel:"Book Your Session"};
  const upd=(fn)=>{setSettings(prev=>{const next={...prev,coaching:{...c}};fn(next.coaching);localStorage.setItem("acc-coaching-settings",JSON.stringify(next));return next})};
  const saveCoaching=async()=>{
    await sb.auth.refreshSession();
    const s=JSON.parse(localStorage.getItem("acc-coaching-settings")||"{}");
    const ok=await sbSaveContent("settings",s);
    showToast(ok?"Page coaching sauvegardée et synchronisée !":"Erreur — reconnectez-vous",ok?"success":"error");
  };

  return(<div>
    <div className="card"><div className="card-header"><div className="card-title">📝 Textes de la page</div></div><div className="card-body">
      <div className="form-group"><label className="form-label">Titre principal</label><input className="form-input" value={c.title} onChange={e=>upd(d=>{d.title=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Sous-titre</label><input className="form-input" value={c.subtitle} onChange={e=>upd(d=>{d.subtitle=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Titre session</label><input className="form-input" value={c.sessionTitle} onChange={e=>upd(d=>{d.sessionTitle=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Sous-titre session</label><input className="form-input" value={c.sessionSub} onChange={e=>upd(d=>{d.sessionSub=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" rows={3} value={c.sessionDesc} onChange={e=>upd(d=>{d.sessionDesc=e.target.value})}/></div>
    </div></div>
    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">✨ Avantages listés</div><button className="btn btn-sm btn-primary" onClick={()=>upd(d=>{d.features=[...d.features,"Nouvel avantage"]})}>+ Ajouter</button></div><div className="card-body">
      {(c.features||[]).map((f,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6}}>
        <input className="form-input" style={{marginBottom:0}} value={f} onChange={e=>upd(d=>{d.features[i]=e.target.value})}/>
        {i>0&&<button className="btn-icon" onClick={()=>upd(d=>{const t=d.features[i];d.features[i]=d.features[i-1];d.features[i-1]=t})}>↑</button>}
        <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>upd(d=>{d.features.splice(i,1)})}>✗</button>
      </div>)}
    </div></div>
    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">🔗 Bouton de réservation</div></div><div className="card-body">
      <div className="form-group"><label className="form-label">URL de réservation</label><input className="form-input" value={c.bookUrl||""} onChange={e=>upd(d=>{d.bookUrl=e.target.value})}/></div>
      <div className="form-group"><label className="form-label">Texte du bouton</label><input className="form-input" value={c.bookLabel||""} onChange={e=>upd(d=>{d.bookLabel=e.target.value})}/></div>
    </div></div>
    <button className="btn btn-primary" style={{marginTop:16}} onClick={saveCoaching}>💾 Sauvegarder et synchroniser</button>
  </div>);
}

// ─── HOME LAYOUT EDITOR ──────────────────────────────────────

    showToast(ok?"Layout sauvegardé et synchronisé !":"Erreur — reconnectez-vous",ok?"success":"error");
  };

  const blockLabels={nextLesson:"🎯 Next Lesson (mise en avant)",courses:"📚 Liste des parcours"};

  return(<div>
    <div className="card"><div className="card-header"><div className="card-title">🏠 Ordre des blocs sur l'accueil</div></div><div className="card-body">
      <div className="para-hint">Déplace les blocs pour changer l'ordre. "Next Lesson" en haut = mise en avant.</div>
      {layout.map((key,i)=>(
        <div key={key} className="list-item">
          <span className="drag-handle">☰</span>
          <div className="item-info"><div className="item-title">{blockLabels[key]||key}</div></div>
          <div className="item-actions">
            {i>0&&<button className="btn-icon" onClick={()=>{const n=[...layout];const t=n[i];n[i]=n[i-1];n[i-1]=t;setLayout(n)}}>↑</button>}
            {i<layout.length-1&&<button className="btn-icon" onClick={()=>{const n=[...layout];const t=n[i];n[i]=n[i+1];n[i+1]=t;setLayout(n)}}>↓</button>}
          </div>
        </div>
      ))}
    </div></div>

    <div className="card" style={{marginTop:16}}><div className="card-header"><div className="card-title">📚 Ordre des parcours</div></div><div className="card-body">
      <div className="para-hint">Change l'ordre d'affichage des parcours dans l'app.</div>
      {courses.map((c,ci)=>(
        <div key={c.id} className="list-item">
          <span style={{fontSize:24}}>{c.icon}</span>
          <div className="item-info"><div className="item-title">{c.title}</div><div className="item-sub">{c.levels.reduce((s,l)=>s+l.chapters.length,0)} chapitres</div></div>
          <div className="item-actions">
            {ci>0&&<button className="btn-icon" onClick={()=>updateCourses(d=>{const t=d[ci];d[ci]=d[ci-1];d[ci-1]=t})}>↑</button>}
            {ci<courses.length-1&&<button className="btn-icon" onClick={()=>updateCourses(d=>{const t=d[ci];d[ci]=d[ci+1];d[ci+1]=t})}>↓</button>}
          </div>
        </div>
      ))}
    </div></div>
    <button className="btn btn-primary" style={{marginTop:16}} onClick={saveLayout}>💾 Sauvegarder et synchroniser</button>
  </div>);
}

// ─── RENDER ───────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp/>);
</script>
</body>
</html>
