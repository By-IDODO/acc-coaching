// ━━━ SESSION JOURNAL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function DevelopmentScreen({uid,name}){
  const emptyForm=()=>({session_date:new Date().toISOString().slice(0,10),car:"",best_lap:"",average_lap:"",starting_position:"",finishing_position:"",crash_count:"",focus:"",main_mistake:"",notes:""});
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[status,setStatus]=useState("");
  const[editingId,setEditingId]=useState(null);
  const[selectedTrack,setSelectedTrack]=useState("");
  const[chartMetric,setChartMetric]=useState('lap_time');
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState(emptyForm());

  const load=React.useCallback(async()=>{
    setLoading(true);
    const data=await sbLoadSessionLogs(uid);
    setItems(data||[]);
    setLoading(false);
  },[uid]);

  useEffect(()=>{load()},[load]);

  useEffect(()=>{
    if(selectedTrack)return;
    const firstTracked=(items||[]).find(item=>item.track&&ACC_TRACKS.includes(item.track));
    if(firstTracked?.track)setSelectedTrack(firstTracked.track);
  },[items,selectedTrack]);

  useEffect(()=>{
    if(editingId){
      const current=items.find(item=>item.id===editingId);
      if(current&&current.track!==selectedTrack){
        setEditingId(null);
        setForm(emptyForm());
        setStatus('Track changed. Editing mode was cleared.');
      }
    }
  },[selectedTrack,editingId,items]);

  const filteredItems=React.useMemo(()=>{
    return (items||[])
      .filter(item=>!selectedTrack||item.track===selectedTrack)
      .sort((a,b)=>new Date(`${b.session_date||'1970-01-01'}T12:00:00`).getTime()-new Date(`${a.session_date||'1970-01-01'}T12:00:00`).getTime());
  },[items,selectedTrack]);

  const chartPoints=React.useMemo(()=>buildTrackMetricSeries(items,selectedTrack,chartMetric),[items,selectedTrack,chartMetric]);
  const metricMeta=React.useMemo(()=>getDevelopmentMetricMeta(chartMetric),[chartMetric]);
  const lapPoints=React.useMemo(()=>buildTrackMetricSeries(items,selectedTrack,'lap_time'),[items,selectedTrack]);
  const bestSeconds=lapPoints.length?Math.min(...lapPoints.map(point=>point.value)):null;
  const latestSession=filteredItems[0]||null;
  const totalForTrack=filteredItems.length;
  const bestFinish=filteredItems.filter(item=>parseInt(item.finishing_position,10)>0).reduce((best,item)=>{
    const pos=parseInt(item.finishing_position,10);
    return best==null?pos:Math.min(best,pos);
  },null);
  const avgStart=filteredItems.filter(item=>parseInt(item.starting_position,10)>0).reduce((acc,item,_,arr)=>acc+(parseInt(item.starting_position,10)||0)/arr.length,0) || null;
  const totalCrashes=filteredItems.reduce((sum,item)=>sum+Math.max(0,parseInt(item.crash_count,10)||0),0);

  const onChange=(key,val)=>setForm(prev=>({...prev,[key]:val}));
  const resetForm=()=>{setEditingId(null);setForm(emptyForm());setShowForm(false);setStatus("")};

  const startEdit=(item)=>{
    if(item.track)setSelectedTrack(item.track);
    setEditingId(item.id);
    setShowForm(true);
    setForm({session_date:item.session_date||new Date().toISOString().slice(0,10),car:item.car||"",best_lap:item.best_lap||"",average_lap:item.average_lap||"",starting_position:item.starting_position!=null?String(item.starting_position):"",finishing_position:item.finishing_position!=null?String(item.finishing_position):"",crash_count:item.crash_count!=null?String(item.crash_count):"",focus:item.focus||"",main_mistake:item.main_mistake||"",notes:item.notes||""});
    setStatus("");
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const submit=async()=>{
    if(!selectedTrack){setStatus('Select a track first.');return;}
    if(!form.session_date){setStatus('Please choose a session date.');return;}
    setSaving(true);setStatus('');
    const payload={session_date:form.session_date,track:selectedTrack,car:form.car.trim()||null,best_lap:form.best_lap.trim()||null,average_lap:form.average_lap.trim()||null,starting_position:form.starting_position?Math.max(1,parseInt(form.starting_position,10)||1):null,finishing_position:form.finishing_position?Math.max(1,parseInt(form.finishing_position,10)||1):null,crash_count:form.crash_count===''?0:Math.max(0,parseInt(form.crash_count,10)||0),focus:form.focus.trim()||null,main_mistake:form.main_mistake.trim()||null,notes:form.notes.trim()||null};
    try{
      const row=editingId?await sbUpdateSessionLog(uid,editingId,payload):await sbCreateSessionLog(uid,payload);
      setItems(prev=>{const next=editingId?prev.map(item=>item.id===editingId?row:item):[row,...prev];return [...next].sort((a,b)=>new Date(`${b.session_date||'1970-01-01'}T12:00:00`).getTime()-new Date(`${a.session_date||'1970-01-01'}T12:00:00`).getTime())});
      setEditingId(null);setForm(emptyForm());setShowForm(false);setStatus(editingId?'Session entry updated.':'Session entry saved.');
    }catch(e){console.error('Development save error:',e);setStatus('Could not save this session entry.');}
    finally{setSaving(false)}
  };

  const remove=async(id)=>{
    if(!window.confirm('Delete this session entry?'))return;
    try{await sbDeleteSessionLog(uid,id);setItems(prev=>prev.filter(item=>item.id!==id));if(editingId===id)resetForm();setStatus('Session entry deleted.')}catch(e){console.error('Development delete error:',e);setStatus('Could not delete this session entry.');}
  };

  return(<div className="scr">
    <div style={S.hdr}><div><div style={S.logoR}><span style={{fontSize:28}}>📈</span><span style={S.logoT}>DEVELOPMENT</span></div><div style={S.tag}>Track your on-track evolution</div></div><div style={{fontSize:12,color:'#666',textAlign:'right'}}>{name}</div></div>
    <div style={{...S.pCard,marginBottom:22}}>
      <div style={{display:'flex',justifyContent:'space-between',gap:16,alignItems:'center',flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:22,fontWeight:800,color:'#fff'}}>Private practice journal</div>
          <div style={{fontSize:13,color:'#888',marginTop:6,lineHeight:1.7,maxWidth:720}}>Use one focused page to log your sessions, follow your lap-time curve, and keep your development organised track by track. These entries stay private to you in the app, while your coach can review them from the admin side.</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,padding:'8px 12px',borderRadius:999,background:'#111',border:'1px solid #222',color:'#aaa'}}>{items.length} total session{items.length!==1?'s':''}</span>
          {selectedTrack&&<span style={{fontSize:12,padding:'8px 12px',borderRadius:999,background:'#1b1013',border:'1px solid #3b1c23',color:'#ff8aa5'}}>{selectedTrack}</span>}
        </div>
      </div>
    </div>

    <div style={{background:'#111',border:'1px solid #222',borderRadius:14,padding:16,marginBottom:18}}>
      <div style={{fontSize:12,fontWeight:700,color:'#888',letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>Select a track</div>
      <select value={selectedTrack} onChange={e=>{setSelectedTrack(e.target.value);setStatus('')}} style={{width:'100%',padding:'13px 14px',borderRadius:12,border:'1px solid #2d2d2d',background:'#0d0d0d',color:'#e2e2e2',fontSize:16,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}>
        <option value="">Choose an ACC circuit</option>
        {ACC_TRACKS.map(track=><option key={track} value={track}>{track}</option>)}
      </select>
      <div style={{fontSize:12,color:'#666',marginTop:10}}>One selected circuit = one chart, one focused entry form, one cleaner visual workflow.</div>
    </div>

    {!selectedTrack?<div style={{background:'#111',border:'1px dashed #2b2b2b',borderRadius:14,padding:28,textAlign:'center',color:'#888'}}><div style={{fontSize:42,marginBottom:8}}>🏁</div><div style={{fontSize:18,fontWeight:700,color:'#e2e2e2'}}>Pick a circuit to start</div><div style={{fontSize:13,lineHeight:1.7,maxWidth:520,margin:'8px auto 0'}}>Once you select a track, you will see only that circuit's development graph, session history, and entry form.</div></div>:(<>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:18}}>
        <div style={S.stB}><div style={S.stBN}>{totalForTrack}</div><div style={S.stBL}>Sessions on {selectedTrack}</div></div>
        <div style={S.stB}><div style={{...S.stBN,fontSize:26}}>{bestSeconds!=null?formatLapSeconds(bestSeconds):'—'}</div><div style={S.stBL}>Best logged lap</div></div>
        <div style={S.stB}><div style={{...S.stBN,fontSize:24}}>{bestFinish!=null?`P${bestFinish}`:'—'}</div><div style={S.stBL}>Best finish</div></div>
        <div style={S.stB}><div style={{...S.stBN,fontSize:24}}>{avgStart!=null?`P${avgStart.toFixed(1)}`:'—'}</div><div style={S.stBL}>Average start</div></div>
        <div style={S.stB}><div style={{...S.stBN,fontSize:24}}>{totalCrashes}</div><div style={S.stBL}>Total crashes logged</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(220px,280px)',gap:12,alignItems:'end',marginBottom:12}}>
        <div>
          <div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Graph view</div>
          <select value={chartMetric} onChange={e=>setChartMetric(e.target.value)} style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}>
            {DEVELOPMENT_METRICS.map(option=><option key={option.value} value={option.value}>{option.label}</option>)}
          </select>
        </div>
        <div style={{fontSize:12,color:'#666',lineHeight:1.6}}>Show only one development curve at a time to keep the page focused: lap time, positions, crashes, or crash rate.</div>
      </div>
      <DevelopmentMetricChart points={chartPoints} metric={chartMetric} title={`${selectedTrack} · ${metricMeta.title.toLowerCase()}`}/>
      <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'center',flexWrap:'wrap',marginTop:18,marginBottom:12}}><div style={{fontSize:16,fontWeight:700,color:'#e2e2e2'}}>Session entries for {selectedTrack}</div><button style={{...S.sec,borderColor:'#e11d4844',color:'#ff7b9a'}} onClick={()=>{setShowForm(v=>!v);setStatus('');if(showForm&&editingId){setEditingId(null);setForm(emptyForm())}}}>{showForm?(editingId?'Close edit':'Hide form'):(editingId?'Edit entry':'Add session entry')}</button></div>
      {showForm&&<div style={{background:'#111',border:'1px solid #222',borderRadius:14,padding:16,marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:14}}><div><div style={{fontSize:17,fontWeight:700,color:'#e2e2e2'}}>{editingId?'Edit session entry':'New session entry'}</div><div style={{fontSize:12,color:'#666',marginTop:3}}>Track locked to <span style={{color:'#ff7b9a'}}>{selectedTrack}</span> so the page stays focused.</div></div>{editingId&&<button style={S.sec} onClick={resetForm}>Cancel edit</button>}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Session date</div><input type='date' value={form.session_date} onChange={e=>onChange('session_date',e.target.value)} style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Car</div><input value={form.car} onChange={e=>onChange('car',e.target.value)} placeholder='e.g. Ferrari 296 GT3' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Best lap</div><input value={form.best_lap} onChange={e=>onChange('best_lap',e.target.value)} placeholder='1:48.532' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Average lap</div><input value={form.average_lap} onChange={e=>onChange('average_lap',e.target.value)} placeholder='1:49.104' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Starting position</div><input type='number' min='1' value={form.starting_position} onChange={e=>onChange('starting_position',e.target.value)} placeholder='e.g. 12' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Finishing position</div><input type='number' min='1' value={form.finishing_position} onChange={e=>onChange('finishing_position',e.target.value)} placeholder='e.g. 7' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Crashes during race</div><input type='number' min='0' value={form.crash_count} onChange={e=>onChange('crash_count',e.target.value)} placeholder='0' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif"}}/></div>
        </div>
        <div style={{display:'grid',gap:10,marginTop:10}}>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Session focus</div><textarea rows={2} value={form.focus} onChange={e=>onChange('focus',e.target.value)} placeholder='What were you working on in this session?' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif",resize:'vertical'}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Main mistake</div><textarea rows={2} value={form.main_mistake} onChange={e=>onChange('main_mistake',e.target.value)} placeholder='What hurt your pace or consistency the most?' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif",resize:'vertical'}}/></div>
          <div><div style={{fontSize:11,color:'#888',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Notes</div><textarea rows={4} value={form.notes} onChange={e=>onChange('notes',e.target.value)} placeholder='Extra observations, setup changes, tyre notes, race sim comments...' style={{width:'100%',padding:'12px 13px',borderRadius:10,border:'1px solid #2b2b2b',background:'#0d0d0d',color:'#fff',fontSize:15,fontFamily:"'Rajdhani','Segoe UI',sans-serif",resize:'vertical'}}/></div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:14}}><button style={{...S.pri,opacity:saving?0.85:1}} onClick={submit} disabled={saving}>{saving?(editingId?'Updating...':'Saving...'):(editingId?'Update session entry':'Save session entry')}</button><button style={S.sec} onClick={resetForm}>Clear</button></div>
      </div>}
      {status&&<div style={{fontSize:12,color:status.toLowerCase().includes('could not')||status.toLowerCase().includes('select')?'#fb7185':'#4ade80',marginBottom:14}}>{status}</div>}
      <div style={{display:'grid',gap:10}}>{loading?<div style={{textAlign:'center',padding:20,color:'#777'}}>Loading development data...</div>:filteredItems.length===0?<div style={{padding:20,border:'1px dashed #2b2b2b',borderRadius:12,color:'#777'}}>No session entries yet for {selectedTrack}. Add one to start your development history.</div>:filteredItems.map(item=><div key={item.id} style={{background:'#111',border:'1px solid #222',borderRadius:14,padding:16}}><div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',flexWrap:'wrap'}}><div><div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{item.session_date?new Date(`${item.session_date}T12:00:00`).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'No date'}{item.car?` · ${item.car}`:''}</div><div style={{fontSize:12,color:'#666',marginTop:4}}>Track: {item.track||selectedTrack}</div></div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{item.best_lap&&<span style={{fontSize:11,padding:'6px 10px',borderRadius:999,background:'#251219',border:'1px solid #4c1d27',color:'#ff7b9a'}}>Best {item.best_lap}</span>}{item.average_lap&&<span style={{fontSize:11,padding:'6px 10px',borderRadius:999,background:'#171717',border:'1px solid #2a2a2a',color:'#bbb'}}>Avg {item.average_lap}</span>}{item.starting_position!=null&&item.starting_position!==''&&<span style={{fontSize:11,padding:'6px 10px',borderRadius:999,background:'#141924',border:'1px solid #243047',color:'#9db4ff'}}>Start P{item.starting_position}</span>}{item.finishing_position!=null&&item.finishing_position!==''&&<span style={{fontSize:11,padding:'6px 10px',borderRadius:999,background:'#132018',border:'1px solid #214430',color:'#8ee7a8'}}>Finish P{item.finishing_position}</span>}<span style={{fontSize:11,padding:'6px 10px',borderRadius:999,background:'#241617',border:'1px solid #462023',color:'#fca5a5'}}>{Math.max(0,parseInt(item.crash_count,10)||0)} crash{Math.max(0,parseInt(item.crash_count,10)||0)===1?'':'es'}</span></div></div>{(item.focus||item.main_mistake||item.notes)&&<div style={{display:'grid',gap:8,marginTop:12}}>{item.focus&&<div><div style={{fontSize:10,color:'#777',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Focus</div><div style={{fontSize:13,lineHeight:1.7,color:'#ddd'}}>{item.focus}</div></div>}{item.main_mistake&&<div><div style={{fontSize:10,color:'#777',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Main mistake</div><div style={{fontSize:13,lineHeight:1.7,color:'#ddd'}}>{item.main_mistake}</div></div>}{item.notes&&<div><div style={{fontSize:10,color:'#777',letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Notes</div><div style={{fontSize:13,lineHeight:1.7,color:'#ddd',whiteSpace:'pre-wrap'}}>{item.notes}</div></div>}</div>}<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:14}}><button style={S.sec} onClick={()=>startEdit(item)}>Edit</button><button style={{...S.sec,borderColor:'#7f1d1d44',color:'#fb7185'}} onClick={()=>remove(item.id)}>Delete</button></div></div>)}</div>
    </>)}</div>);
}

function Profile({prog,st,nav,user,name,profile,uid,onReset,onLogout}){
  const[cfm,setCfm]=useState(false);const[showLB,setShowLB]=useState(false);const[lbData,setLbData]=useState([]);
  const loadLB=()=>{if(!showLB){setShowLB(true);sbGetLB().then(d=>setLbData(d))}else setShowLB(false)};
  const rc=["#f59e0b","#94a3b8","#cd7f32"];
  return(<div className="scr">
    <div style={{textAlign:"center",marginBottom:32,paddingTop:8}}>
      <div style={S.prAv}><span style={{fontSize:40}}>🏁</span></div>
      <div style={S.pgT}>{name}</div>
      <div style={{fontSize:12,color:"#666",marginTop:4}}>{user.email}</div>
      <div style={{...S.lvB,display:"inline-flex",marginTop:8,background:st.percent>=80?"#ef444422":st.percent>=40?"#f59e0b22":"#22c55e22",color:st.percent>=80?"#ef4444":st.percent>=40?"#f59e0b":"#22c55e",borderColor:st.percent>=80?"#ef444444":st.percent>=40?"#f59e0b44":"#22c55e44"}}>{st.percent>=80?"Expert":st.percent>=40?"Intermediate":"Beginner"}</div>
      {profile?.last_active&&<div style={{fontSize:11,color:"#666",marginTop:8}}>Last active: {new Date(profile.last_active).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})} · {new Date(profile.last_active).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>}
    </div>
    <div className="stat-grid-4">
      <div style={S.stB}><div style={S.stBN}>{st.completed}</div><div style={S.stBL}>Done</div></div>
      <div style={S.stB}><div style={S.stBN}>{st.total}</div><div style={S.stBL}>Total</div></div>
      <div style={S.stB}><div style={S.stBN}>{st.completed>0?Math.round(st.avgScore)+"%":"—"}</div><div style={S.stBL}>Avg Score</div></div>
      <div style={S.stB}><div style={S.stBN}>{st.percent}%</div><div style={S.stBL}>Progress</div></div>
    </div>
    <div style={{...S.secT,marginTop:32}}><div style={S.rB}/>COURSE BREAKDOWN</div>
    {COURSES.map(c=>{const ch=c.levels.flatMap(l=>l.chapters);const d=ch.filter(x=>prog[x.id]?.completed).length;
      return<div key={c.id} style={S.prR}><span style={{fontSize:24}}>{c.icon}</span><div style={{flex:1}}><div style={{color:"#e2e2e2",fontSize:15,fontWeight:600}}>{c.title}</div><div style={{color:"#666",fontSize:13,marginTop:2}}>{d}/{ch.length}</div></div><div style={{...S.mBO,width:80}}><div style={{...S.mBI,width:Math.round((d/ch.length)*100)+"%"}}/></div></div>})}

    <button style={{...S.sec,width:"100%",justifyContent:"center",marginTop:24}} onClick={loadLB}>🏆 {showLB?"Hide":"Show"} Leaderboard</button>
    {showLB&&<div style={{marginTop:16}}>
      {lbData.length===0?<div style={{textAlign:"center",color:"#666",padding:20}}>No rankings yet</div>:
      <div className="lb-grid">{lbData.map((e,i)=>(
        <div key={e.id} className={`lb-row ${e.id===uid?"me":""}`}>
          <div className="lb-rank" style={{background:i<3?rc[i]+"22":"#1a1a1a",color:i<3?rc[i]:"#666"}}>{i<3?["🥇","🥈","🥉"][i]:i+1}</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:e.id===uid?"#e11d48":"#e2e2e2"}}>{e.display_name}{e.id===uid&&" (you)"}</div><div style={{fontSize:12,color:"#666"}}>{e.completed}/{e.total} · {e.avg_score}% avg</div></div>
          <div style={{fontSize:20,fontWeight:800,color:"#e11d48"}}>{e.percent}%</div>
        </div>
      ))}</div>}
    </div>}

    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:32,flexWrap:"wrap"}}>
      {!cfm?<button style={{...S.sec,borderColor:"#ef444444",color:"#ef4444"}} onClick={()=>setCfm(true)}>Reset Progress</button>:
      <><button style={{...S.sec,borderColor:"#ef444444",color:"#ef4444"}} onClick={()=>{onReset();setCfm(false)}}>Confirm</button><button style={S.sec} onClick={()=>setCfm(false)}>Cancel</button></>}
      <button style={{...S.sec,borderColor:"#66666644"}} onClick={onLogout}>Sign Out</button>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
